## 🧮 二、形式化数学模型（Formal Mathematical Specification）

### 2.1 PoUE 核心评分函数
$$
S_{PoUE}(t) = \alpha \cdot U_{entity} + \beta \cdot C_{engagement}(t) + \gamma \cdot E_{resonance}(t) - \delta \cdot F_{fraud}(t)
$$
**参数约束**：
- $\alpha + \beta + \gamma + \delta = 1$, $\alpha,\beta,\gamma,\delta \in [0.1, 0.4]$
- $U_{entity} \in \{0,1\}$：唯一实体验证（ZK-KYC + .soul SBT + 硬件根信任）
- $C_{engagement}(t) \in [0,1]$：认知参与度归一化值
  $$
  C_{engagement}(t) = \frac{\sum_{k=1}^{N(t)} w_k \cdot q_k \cdot e^{-\lambda(t-t_k)}}{\max(C_{ref})}
  $$
  其中 $w_k$ 为任务难度权重，$q_k$ 为质量系数（ECE 验证），$\lambda$ 为时效衰减因子
- $E_{resonance}(t) \in [0,1]$：情绪共振对齐度（ECE 输出 / 100）
- $F_{fraud}(t) \in [0,1]$：反女巫/异常行为惩罚（Sybil 检测 + 行为偏离度）

**归一化输出**：
$$
\tilde{S}_{PoUE}(t) = \frac{S_{PoUE}(t)}{\sum_{j \in \mathcal{N}} S_{PoUE}^j(t)}
$$

### 2.2 定理：PoUE 抗女巫与渐进公平性
**命题**：在 ZK 实体绑定与时效衰减假设下，PoUE 评分分布对批量注册攻击具有指数级抗性，且长期参与者权重单调收敛至稳态。
**证明概要**：
- 实体层：$U_{entity}=1$ 需通过 TEE 签名 + ZK 身份证明，伪造成本 $C_{forge} \propto e^{k \cdot N_{batch}}$
- 参与层：$e^{-\lambda \Delta t}$ 使“刷量行为”权重随时间衰减，真实持续参与权重占比 $\uparrow$
- 共振层：$E_{resonance}$ 引入 ECE 多签校验，偏离基线 > 阈值触发 $\mathcal{F}_{ECE}$ 衰减
- 结论：$\frac{d}{dt} \tilde{S}_{PoUE}^{honest} > 0$, $\frac{d}{dt} \tilde{S}_{PoUE}^{sybil} < 0$，系统渐近公平。

