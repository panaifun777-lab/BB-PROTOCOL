## 🛡️ B1.4: 创作者分层激励模型 + 风险应对矩阵

### 💰 分层激励模型（基于认知活性+商业潜力）
```typescript
interface IncentiveModel {
  tier: 'L1_PIONEER' | 'L2_SEED' | 'L3_OBSERVER';
  
  // 代币激励（线性释放，防刷）
  tokenBonus: {
    amount: number;           // AFC数量
    vesting: {
      cliff_days: number;     // 解锁等待期
      duration_days: number;  // 线性释放周期
      performanceMultiplier: (metrics: CreatorMetrics) => number; // 基于表现的乘数
    };
  };
  
  // 非代币激励
  nonTokenPerks: {
    gasSubsidy: { enabled: boolean; cap_usd: number };
    prioritySupport: { enabled: boolean; sla_hours: number };
    featureEarlyAccess: string[];  // 提前体验新功能
    communityGovernance: { votingWeightBonus: number };
  };
  
  // 动态调整规则
  dynamicAdjustment: {
    // 共振分奖励：高共振 → 额外代币
    resonanceBonus: (score: number) => number;  // 0-2x multiplier
    // 协作奖励：多分身协作 → 额外收益分成
    collaborationBonus: (collabCount: number) => number;  // +1% per collab, max +10%
    // 熔断惩罚：频繁触发 → 降低激励
    circuitPenalty: (triggerCount: number) => number;  // -5% per trigger, max -30%
  };
}

// 实际配置示例
const INCENTIVE_CONFIG: Record<string, IncentiveModel> = {
  L1_PIONEER: {
    tier: 'L1_PIONEER',
    tokenBonus: {
      amount: 500,  // 500 AFC (~$50)
      vesting: {
        cliff_days: 7,
        duration_days: 90,
        performanceMultiplier: (m) => 1 + (m.firstRevenueDays <= 7 ? 0.5 : 0) + (m.nps >= 70 ? 0.3 : 0)
      }
    },
    nonTokenPerks: {
      gasSubsidy: { enabled: true, cap_usd: 20 },
      prioritySupport: { enabled: true, sla_hours: 2 },
      featureEarlyAccess: ['IFD_delegation', 'cognitive_export', 'enterprise_sdk'],
      communityGovernance: { votingWeightBonus: 2.0 }
    },
    dynamicAdjustment: {
      resonanceBonus: (score) => score >= 80 ? 1.5 : score >= 70 ? 1.2 : 1.0,
      collaborationBonus: (count) => Math.min(count * 0.01, 0.10),
      circuitPenalty: (count) => Math.max(1 - count * 0.05, 0.70)
    }
  },
  // L2/L3 配置类似，激励递减...
};
