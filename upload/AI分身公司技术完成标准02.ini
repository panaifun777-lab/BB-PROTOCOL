## 🛡️ 五、安全、隐私与合规架构（Security & Compliance）

### 5.1 反女巫攻击（Anti-Sybil）三层防御
| 层级 | 机制 | 技术实现 |
|------|------|---------|
| **实体层** | 唯一性绑定 | TEE 硬件签名 + ZK 身份证明（Semaphore/ZK-KYC） |
| **行为层** | 时效衰减 + 质量校验 | $e^{-\lambda \Delta t}$ 衰减 + ECE 多签评分 |
| **经济层** | 惩罚与质押 | 欺诈行为扣除质押 AFC，连续违规永久降权 |

### 5.2 隐私保护设计
- **零知识实体验证**：不上传生物特征/身份证，仅证明“唯一人类实体”
- **行为数据分片加密**：原始交互日志本地加密，仅上链 Merkle Root
- **可选匿名参与**：用户可开启“隐私模式”，PoUE 评分聚合后参与治理，不暴露身份

### 5.3 全球合规模型
| 司法辖区 | 合规要点 | PoUE 适配策略 |
|---------|---------|--------------|
| 🇪🇺 欧盟 (GDPR) | 数据最小化、可遗忘权 | ZK 验证不存原始数据；提供“认知档案删除”接口 |
| 🇺🇸 美国 (CCPA/SEC) | 效用代币非证券 | PoUE 仅为治理/燃料信号，无收益分配承诺 |
| 🇨🇳 中国 (个保法) | 数据本地化、出境合规 | 境内节点部署 ECE 预言机；支持国密 SM2/SM3 替换 |
| 🇸🇬 新加坡 (PDPA) | 明示同意、用途限制 | 用户授权开关明确；PoUE 仅用于协议内功能 |

