## 🧮 核心数学模型（可写入白皮书第4节）

### 1. 个体认知权重公式
$$
W_{i,d} = \lambda_1 \cdot C_{match} + \lambda_2 \cdot H_{contrib} + \lambda_3 \cdot R_{score} + \lambda_4 \cdot T_{perf} - \lambda_5 \cdot D_{decay}
$$
| 参数 | 含义 | 计算方式 | 权重(λ) |
|------|------|---------|--------|
| $C_{match}$ | 领域认知匹配度 | 技能向量余弦相似度 / 1.0 | 0.30 |
| $H_{contrib}$ | 历史贡献度 | 累计任务完成量 × 质量系数 | 0.25 |
| $R_{score}$ | 情绪共振分 | ECE预言机输出 [0,100] | 0.25 |
| $T_{perf}$ | 近期任务表现 | 过去7天成功率 × 时效系数 | 0.15 |
| $D_{decay}$ | 时间衰减惩罚 | $\frac{t_{last\_vote}}{t_{current}} \times 0.05$ | 0.05 |

> ✅ **设计哲学**：权重不依赖“持币量”，而依赖**“认知活性”**。沉默者权重自然衰减，活跃者权重指数上升。

### 2. 动态委托与撤销逻辑
$$
V_{delegated}(t) = \sum_{i=1}^{n} W_{i,d}(t) \cdot \mathbb{I}(delegate_i \neq \text{self})
$$
- 委托有效期：默认30天，可续期或提前撤销
- 跨域委托禁止：`content_creation` 权重不可委托给 `contract_signing` 领域
- 撤销即时生效：链上状态同步，无需等待区块确认

### 3. ECE情绪共识过滤函数
$$
W_{final} = W_{computed} \times \left(1 - \alpha \cdot |R_{score} - R_{threshold}|\right)
$$
- 若共振分偏离本体基线 > 15分，权重打8折
- 偏离 > 25分，触发软熔断，投票暂停至人工复核
- 实现“理性权重”与“情感一致性”的双重校验

### 4. 链上治理执行流
```
用户发起提案 → IFD计算当前活跃权重分布 → ECE校验共振阈值 → 
达到60%加权支持 → 智能合约自动执行（参数调整/金库拨付/合约升级） → 
记录链上凭证，更新认知贡献历史
