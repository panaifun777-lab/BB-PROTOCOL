## 2. IFD 架构与治理流（Architecture & Governance Flow）

### 2.1 系统组件拓扑
```
[ 用户/本体 ] → 发起提案/委托 → [ IFD Router (链下计算) ]
                                      ↓
[ ECE Oracle ] → 情绪签名验证 → [ ECE Filter (链上/链下混合) ]
                                      ↓
[ Quorum Engine ] → 阈值检查 → [ Execution Router ] → [ 智能合约自动执行 ]
                                      ↓
[ Circuit Guard ] → 异常拦截 → [ 人工复核/流体恢复 ]
```

### 2.2 治理生命周期
1. **委托建立**：用户选择领域（如 `content_creation`），滑动分配权重至子分身/其他节点
2. **权重计算**：IFD 引擎每 6 小时聚合链上行为数据，输出 $W_{i,d}(t)$
3. **情绪校验**：ECE 预言机生成 EIP-712 签名，验证共振偏离度
4. **提案投票**：加权投票 + ECE 软过滤 → 达到 60% 有效权重即触发执行
5. **状态同步**：委托关系即时上链，撤销操作 $O(1)$ 状态更新
6. **熔断干预**：共振分 < 50 触发软限制，< 30 触发硬暂停，人工多签恢复

