### 🧮 形式化数学模型（可直接写入白皮书第5节）
#### 定义 1：认知权重函数 $W_{i,d}(t)$
$$
W_{i,d}(t) = \underbrace{\lambda_1 C_{i,d}(t)}_{\text{领域匹配}} + \underbrace{\lambda_2 H_{i}(t)}_{\text{历史贡献}} + \underbrace{\lambda_3 R_{i}(t)}_{\text{情绪共振}} + \underbrace{\lambda_4 T_{i}(t)}_{\text{近期表现}} - \underbrace{\lambda_5 D_{i}(t)}_{\text{时间衰减}}
$$
约束条件：$\sum \lambda_k = 1$, $\lambda_k \in [0,1]$, $D_i(t) = \gamma \cdot \frac{t - t_{last\_action}}{t_{max}}$

#### 定理 1：权重动态均衡性（Proof Sketch）
若系统存在连续任务流，且 $\gamma > 0$，则 $\lim_{t \to \infty} W_{i,d}(t)$ 收敛至稳定区间 $[W_{min}, W_{max}]$。  
**证明思路**：构造Lyapunov函数 $V(W) = \sum (W_{i,d} - W^*)^2$，证明 $\dot{V} \leq 0$ 当任务分布平稳时成立。系统具备抗刷票与沉默衰减特性。

#### 定义 2：ECE情感过滤算子 $\mathcal{F}_{ECE}$
$$
W_{i,d}^{filtered}(t) = W_{i,d}(t) \cdot \left[ 1 - \alpha \cdot \max\left(0, \frac{|R_i(t) - R_{base}|}{R_{threshold}} - 1\right) \right]
$$
当 $|R_i - R_{base}| > R_{threshold}$ 时，触发软熔断 $\mathcal{C}_{soft}$；权重衰减至 $0.6W$，直至人工复核或多签恢复。

#### 推论 1：个体流体民主委托可逆性
$$
V_{delegated}(t) = \sum_{j} W_{j,d}^{filtered}(t) \cdot \mathbb{I}(delegate_j \neq self)
$$
委托关系 $\delta(t)$ 为链上可撤销状态变量。撤销操作 $\delta'(t) = \delta(t) - \Delta$ 即时生效，无需区块确认。保证人类主体性始终为最终锚点。

#### 经济对齐引理：AFC通缩循环稳定性
设协议收入 $I(t)$，金库回购率 $\beta = 20\%$，燃烧率 $\theta = 5\%$。  
若 $\frac{d}{dt} \ln(S(t)) < -\theta \cdot \beta \cdot \frac{I(t)}{S(t)}$，则流通量 $S(t)$ 呈渐进衰减，价值捕获率 $\eta = \frac{\text{AFC consumed}}{\text{AFC circulated}}$ 随生态活跃度单调递增。

