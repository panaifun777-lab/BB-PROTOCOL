| **① 引用即结算** | ✅ 契约闭环核心 | `x402 + citationCount` 链上绑定，被引用自动触发微支付 | 仅记录哈希，原始内容离链存储 |
| **② 插件式架构** | ✅ 不影响核心路径 | `ICognitiveMarkup` 为可选接口，`SkillVault` 通过 `delegatecall` 调用 | 主合约逻辑零修改，升级独立 |
| **③ 数据主权** | ✅ 隐私优先执行 | 前端差分隐私 + 链上聚合指标 + 零知识证明预留 | 原始交互数据不离端，合规默认开启 |

