```solidity
pragma solidity ^0.8.24;
pragma certora;

import "../contracts/src/economics/DynamicSplitter.sol";
import "../contracts/src/governance/IFDRouter.sol";
import "../contracts/src/security/CircuitGuard.sol";
import "../contracts/src/consensus/PoUEVerifier.sol";

env {
    address owner;
    address user;
    uint256 soulId;
}

// 1. 分账守恒律（资金不增不减）
rule splitConservation(uint256 amount, uint256 complexity) {
    require(amount > 0 && complexity >= 0);
    DynamicSplitter.SplitResult memory res = splitter.executeSplit(soulId, amount, complexity);
    assert res.humanShare + res.avatarShare + res.protocolShare == amount : "Split sum mismatch";
}

// 2. IFD 权重归一化（总和恒为 10000 BPS）
rule ifdWeightNormalization(string domain) {
    (uint256 total, uint256[] memory weights) = ifdRouter.computeEffectiveWeight(domain);
    assert total == 10000 : "IFD weights not normalized";
}

// 3. 熔断拦截不可绕过
rule circuitGuardEnforcement(uint256 _soulId, bytes32 actionHash) {
    require(guard.evaluateState(_soulId) == CircuitState.HARD_PAUSE);
    bool allowed = true;
    try guard.executeWithGuard(_soulId, actionHash, true) {
        allowed = true;
    } catch {
        allowed = false;
    }
    assert allowed == false : "Hard pause bypassed";
}

// 4. PoUE 防女巫衰减（时间衰减单调非增）
rule poUEAntiSybilDecay(uint256 _entityId, uint256 timeDelta) {
    require(timeDelta > 0);
    uint256 scoreBefore = poUE.getEffectiveWeight(_entityId);
    uint256 scoreAfter = poUE.getEffectiveWeightAfterTime(_entityId, timeDelta);
    assert scoreAfter <= scoreBefore : "PoUE score increased without engagement";
}

// 5. 委托原子性（撤销即时生效）
rule delegationAtomicity(address delegate, string domain) {
    bool beforeActive = ifdRouter.isDelegated(user, delegate, domain);
    ifdRouter.revokeDelegation(delegate, domain);
    bool afterActive = ifdRouter.isDelegated(user, delegate, domain);
    assert beforeActive == true && afterActive == false : "Delegation not atomically revoked";
}
```

