## ⚙️ 三、技术架构与接口规范（Production Implementation）

### 3.1 链上/链下协同拓扑
```
[ 用户/本体 ] → 行为交互/任务执行 → [ 边缘日志聚合器 (Off-chain) ]
                                          ↓
[ ZK 实体验证器 ] → 硬件签名 + ZK-KYC → [ PoUE Merkle Root 生成 ]
                                          ↓
[ ECE 共振预言机 ] → 情绪评分 + 多签 → [ PoUE Filter 校验 ]
                                          ↓
[ AFC 链上合约 ] → 验证 ZK 证明 + 更新权重 → [ 分配 IFD 委托 / Gas 折扣 / 技能解锁 ]
```

### 3.2 Solidity 接口规范
```solidity
// SPDX-License-Identifier: MIT
pragma solidity ^0.8.24;

interface IPoUEVerifier {
    struct PoUEScore {
        uint256 entityId;      // .soul SBT ID
        uint256 scoreBps;      // 0-10000 (归一化)
        uint256 lastUpdated;   // 时间戳
        bytes32 merkleRoot;    // 行为日志根哈希
        bool isVerified;       // ZK 验证状态
    }
    
    // 提交 ZK 证明更新 PoUE 评分
    function updatePoUEScore(
        uint256 entityId,
        uint256 newScoreBps,
        bytes calldata zkProof,
        bytes32 merkleRoot
    ) external;
    
    // 查询有效 PoUE 权重（用于 IFD 委托/分账折扣）
    function getEffectiveWeight(uint256 entityId) external view returns (uint256);
    
    // 惩罚异常行为（Sybil/熔断触发后）
    function applyFraudPenalty(uint256 entityId, uint256 penaltyBps) external onlyGuardian;
    
    // 事件日志
    event PoUEUpdated(uint256 entityId, uint256 newScoreBps, uint256 timestamp);
    event FraudPenalized(uint256 entityId, uint256 penaltyBps, uint256 timestamp);
}
```

### 3.3 ZK 电路规范（Circom/Noir 兼容）
```circom
// PoUE_Verifier.circom
template PoUEVerifier() {
    signal input entity_hash;      // ZK-KYC 实体哈希
    signal input engagement_root;  // 行为日志 Merkle Root
    signal input ece_signature;    // ECE 多签摘要
    signal output is_valid;        // 验证结果
    
    // 1. 验证实体唯一性（硬件 TEE 签名 + DID 绑定）
    component tee_verify = TEESignatureVerifier();
    tee_verify.pubkey <== entity_hash;
    
    // 2. 验证行为日志完整性（Merkle 根匹配）
    component merkle_check = MerkleRootChecker(20);
    merkle_check.root <== engagement_root;
    
    // 3. 验证 ECE 共振签名有效性
    component ece_verify = ECDSAVerifier();
    ece_verify.signature <== ece_signature;
    
    is_valid <== tee_verify.result && merkle_check.result && ece_verify.result;
}
```
> ✅ **Gas 优化**：链上仅验证 `is_valid` 布尔值与 `merkleRoot`，原始日志存于 IPFS/Arweave。单次验证 Gas < 45,000。

