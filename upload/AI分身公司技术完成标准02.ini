### `.github/workflows/ci.yml`
```yaml
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        
      - name: Install dependencies
        run: forge install
        
      - name: Run tests with coverage
        run: forge coverage --report summary --report lcov
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./lcov.info
          flags: unittests
          fail_ci_if_error: true

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run Slither
        uses: crytic/slither-action@v0.3.0
        with:
          slither-args: '--exclude-informational --exclude-optimization'
          fail-on: 'medium'

  gas-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Generate gas report
        run: forge test --gas-report > gas-report.txt
      - name: Comment PR with gas report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('gas-report.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⛽ Gas Report\n\`\`\`\n${report}\`\`\``
            });

  deploy-base-sepolia:
    needs: [test, static-analysis]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: base-sepolia
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Deploy to Base Sepolia
        run: |
          forge script script/DeployBase.s.sol \
            --rpc-url ${{ secrets.BASE_SEPOLIA_RPC }} \
            --private-key ${{ secrets.DEPLOYER_PK }} \
            --broadcast \
            --verify \
            --etherscan-api-key ${{ secrets.BASESCAN_API_KEY }} \
            --verifier-url https://api-sepolia.basescan.org/api
```

