## 🔐 安全与隐私设计（Security & Privacy UX）

### 1. **敏感操作确认流程**
```typescript
interface SensitiveActionConfirm {
  actionType: 'withdraw_funds' | 'change_delegation' | 'revoke_access';
  riskLevel: 'low' | 'medium' | 'high';
  
  // 低风险：生物识别/密码
  lowRisk: {
    method: 'biometric' | 'password';
    timeout: 60; // 秒
  };
  
  // 中风险：多因素认证
  mediumRisk: {
    method: '2fa_totp' | 'email_code';
    timeout: 300; // 秒
  };
  
  // 高风险：多签/延迟执行
  highRisk: {
    method: 'multi_sig' | 'time_lock';
    requiredSigners: 2;
    timeLockHours: 24;
    notificationChannels: ['email', 'sms', 'push'];
  };
}
```

### 2. **隐私保护模式**
```typescript
interface PrivacyMode {
  // 公共模式（默认）
  public: {
    showRevenue: true;
    showResonanceScore: true;
    showCognitiveRoot: true;
    allowDiscovery: true; // 可被市场搜索
  };
  
  // 隐私模式
  private: {
    showRevenue: false; // 显示"隐藏"
    showResonanceScore: false;
    showCognitiveRoot: false;
    allowDiscovery: false; // 仅通过DID访问
    zeroKnowledgeProof: true; // 使用ZK证明能力，不暴露数据
  };
  
  // 混合模式
  selective: {
    showRevenueTo: 'delegates_only';
    showResonanceTo: 'public';
    allowDiscovery: true;
  };
}
```

