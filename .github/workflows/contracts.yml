# =============================================================================
# Smart Contract CI — Cognitive Avatar Protocol
# =============================================================================
# Triggers: changes to contracts/
# Jobs: forge-test → forge-fmt → slither → gas-report
# =============================================================================

name: Smart Contracts CI

on:
  push:
    paths:
      - "contracts/**"
    branches: [main, develop]
  pull_request:
    paths:
      - "contracts/**"
    branches: [main]

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: default
  FOUNDRY_SOLC_VERSION: "0.8.24"

jobs:
  # ── Job 1: Forge Test ─────────────────────────────────────────────────────
  forge-test:
    name: Forge Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Compile contracts
        run: forge build

      - name: Run Forge tests
        run: forge test -vvv
        env:
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}

      - name: Run test with gas snapshots
        run: forge test --gas-report > gas-report-raw.txt 2>&1 || true

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: contracts/gas-report-raw.txt
          retention-days: 7

  # ── Job 2: Forge Format Check ─────────────────────────────────────────────
  forge-fmt:
    name: Solidity Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check Solidity formatting
        run: forge fmt --check

  # ── Job 3: Slither Static Analysis ────────────────────────────────────────
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither analysis
        run: |
          slither . \
            --sarif slither-results.sarif \
            --exclude-dependencies \
            --exclude-low \
            --filter-paths "lib/" \
            --ignore-compile || true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: contracts/slither-results.sarif
          category: slither
          wait-for-processing: true

      - name: Slither summary
        if: always()
        run: |
          if [ -f slither-results.sarif ]; then
            echo "## Slither Analysis Results" >> $GITHUB_STEP_SUMMARY
            TOTAL=$(jq '.runs[0].results | length' slither-results.sarif 2>/dev/null || echo "0")
            echo "Total findings: ${TOTAL}" >> $GITHUB_STEP_SUMMARY

            HIGH=$(jq '[.runs[0].results[] | select(.level == "error")] | length' slither-results.sarif 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.runs[0].results[] | select(.level == "warning")] | length' slither-results.sarif 2>/dev/null || echo "0")
            LOW=$(jq '[.runs[0].results[] | select(.level == "note")] | length' slither-results.sarif 2>/dev/null || echo "0")

            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High     | ${HIGH} |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium   | ${MEDIUM} |" >> $GITHUB_STEP_SUMMARY
            echo "| Low      | ${LOW} |" >> $GITHUB_STEP_SUMMARY

            if [ "${HIGH}" -gt 0 ]; then
              echo "::warning::Slither found ${HIGH} high-severity issues"
            fi
          else
            echo "No SARIF results file generated" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Job 4: Gas Report ─────────────────────────────────────────────────────
  gas-report:
    name: Gas Usage Report
    runs-on: ubuntu-latest
    needs: forge-test
    timeout-minutes: 15
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Generate gas report
        run: forge test --gas-report > gas-report.txt 2>&1 || true

      - name: Compare with base branch
        id: compare
        run: |
          # Checkout base branch for comparison
          git stash || true
          git checkout ${{ github.base_ref }} 2>/dev/null || true

          if [ -f "foundry.toml" ]; then
            forge install || true
            forge test --gas-report > gas-report-base.txt 2>&1 || true
          else
            echo "No contracts on base branch" > gas-report-base.txt
          fi

          git checkout - || true
          git stash pop || true

          echo "has_comparison=true" >> $GITHUB_OUTPUT

      - name: Format gas report for PR comment
        id: format
        run: |
          {
            echo "## ⛽ Gas Report"
            echo ""
            echo "### Current Branch (\`${{ github.head_ref }}\`)"
            echo '```'
            cat gas-report.txt 2>/dev/null || echo "No gas report generated"
            echo '```'
            echo ""

            if [ -f gas-report-base.txt ] && [ -s gas-report-base.txt ]; then
              echo "### Base Branch (\`${{ github.base_ref }}\`)"
              echo '```'
              cat gas-report-base.txt 2>/dev/null || echo "No base gas report"
              echo '```'
            fi
          } > gas-report-comment.md

          # Read the comment body
          COMMENT_BODY=$(cat gas-report-comment.md)
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "${COMMENT_BODY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post gas report as PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gas-report
          path: contracts/gas-report-comment.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gas report summary
        run: |
          cat gas-report-comment.md >> $GITHUB_STEP_SUMMARY
