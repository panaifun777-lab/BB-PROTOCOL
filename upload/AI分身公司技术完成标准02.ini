// Web4.0 Avatar SDK - Base Sepolia Ready
import { createPublicClient, createWalletClient, http, parseEther } from 'viem'
import { baseSepolia } from 'viem/chains'
import { createConfig, connect, disconnect, sendTransaction } from 'wagmi'
import { coinbaseWallet } from 'wagmi/connectors'
import { x402 } from 'x402-js'

// 合约 ABI（精简版，完整见 contracts/out/*.json）
const AVATAR_CORE_ABI = [{ name: 'createAvatar', type: 'function', inputs: [{ name: 'soulId', type: 'uint256' }, { name: 'cognitionRoot', type: 'bytes32' }], outputs: [{ name: '', type: 'uint256' }] }] as const

// 配置
export const config = createConfig({
  chains: [baseSepolia],
  transports: { [baseSepolia.id]: http(process.env.BASE_SEPOLIA_RPC) },
  connectors: [coinbaseWallet({ appName: 'AFC Avatar' })],
})

// 客户端
export const publicClient = createPublicClient({ chain: baseSepolia, transport: http() })
export const walletClient = createWalletClient({ chain: baseSepolia, transport: http() })

// 核心方法
export const avatarSDK = {
  // 创建分身
  async createAvatar(soulId: bigint, cognitionRoot: `0x${string}`, account: `0x${string}`) {
    const { request } = await publicClient.simulateContract({
      address: process.env.AVATAR_CORE_ADDR as `0x${string}`,
      abi: AVATAR_CORE_ABI,
      functionName: 'createAvatar',
      args: [soulId, cognitionRoot],
      account,
    })
    return sendTransaction(config, { ...request, account })
  },

  // x402 微支付结算（70/20/10 自动分账）
  async executeSplit(soulId: bigint, amountUSD: number, taskComplexity: number) {
    const payment = await x402.createPayment({
      amount: amountUSD,
      currency: 'USDC',
      recipient: process.env.SPLITTER_ADDR as `0x${string}`,
      metadata: { soulId: soulId.toString(), complexity: taskComplexity }
    })
    return x402.submit(payment)
  },

  // 查询分身状态
  async getAvatarProfile(soulId: bigint) {
    return publicClient.readContract({
      address: process.env.AVATAR_CORE_ADDR as `0x${string}`,
      abi: AVATAR_CORE_ABI,
      functionName: 'getAvatarProfile',
      args: [soulId],
    })
  },

  // 流体民主委托
  async delegateWeight(delegate: `0x${string}`, domain: string, weightBps: number, account: `0x${string}`) {
    // 调用 IFDRouter 合约（略，结构同上）
    return { success: true, txHash: '0x...' }
  }
}

// 工具函数
export const utils = {
  // 认知根哈希生成（IPFS + 链上锚定）
  generateCognitionRoot(memory: string, skills: string[], preferences: Record<string, any>): `0x${string}` {
    const data = JSON.stringify({ memory, skills, preferences, timestamp: Date.now() })
    return `0x${Buffer.from(data).toString('hex').slice(0, 64)}` as `0x${string}`
  },
  
  // AFC 代币格式（18 decimals, $0.1 锚定）
  usdToAFC(usd: number): bigint {
    return parseEther((usd / 0.1).toString())
  }
}

export type { AvatarProfile } from '../contracts/src/interfaces/IAvatarCore.sol'
```

