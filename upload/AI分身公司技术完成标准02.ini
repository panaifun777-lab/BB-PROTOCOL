### 🧮 2. 核心形式化不变量（Certora Spec 示例）
```solidity
// 1. 分账守恒律
rule splitConservation(uint256 amount) {
    require(amount > 0);
    (uint256 human, uint256 avatar, uint256 protocol) = splitter.executeSplit(soulId, amount, complexity);
    assert human + avatar + protocol == amount;
}

// 2. 权重归一化（IFD）
rule weightSumNormalization(string domain) {
    (uint256 total, uint256[] memory weights) = ifdRouter.computeEffectiveWeight(domain);
    assert total == 10000; // BPS 基准
}

// 3. 熔断触发与执行阻断
rule circuitGuardBlocksHighRisk(uint256 soulId, bytes32 actionHash) {
    require(guard.evaluateState(soulId) == CircuitState.HARD_PAUSE);
    try guard.executeWithGuard(soulId, actionHash, true) {
        revert(); // 预期失败
    } catch {
        // 正确拦截
    }
}

// 4. PoUE 防女巫衰减
rule poUEAntiSybilDecay(uint256 entityId, uint256 timeDelta) {
    uint256 scoreBefore = poUE.getEffectiveWeight(entityId);
    uint256 scoreAfter = poUE.getEffectiveWeightAfterTime(entityId, timeDelta);
    assert scoreAfter <= scoreBefore * exp(-lambda * timeDelta);
}
```

