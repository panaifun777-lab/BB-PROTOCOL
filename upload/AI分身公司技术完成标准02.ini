## 🧪 测试套件（15+核心测试用例）

### `test/economics/DynamicSplitter.t.sol`
```solidity
// SPDX-License-Identifier: MIT
pragma solidity ^0.8.24;

import "forge-std/Test.sol";
import "../../src/economics/DynamicSplitter.sol";
import "../../src/core/AvatarCore.sol";
import "../mocks/MockOracle.sol";
import "../mocks/MockToken.sol";

contract DynamicSplitterTest is Test {
    DynamicSplitter public splitter;
    AvatarCore public avatarCore;
    MockOracle public oracle;
    MockToken public usdc;
    MockToken public afc;
    
    address public admin = makeAddr("admin");
    address public user = makeAddr("user");
    uint256 public soulId = 1;
    
    function setUp() public {
        // 部署依赖
        oracle = new MockOracle();
        usdc = new MockToken("USDC", 6);
        afc = new MockToken("AFC", 18);
        
        // 部署AvatarCore
        avatarCore = new AvatarCore();
        avatarCore.initialize(admin, address(oracle));
        
        // 部署DynamicSplitter
        splitter = new DynamicSplitter();
        splitter.initialize(
            address(avatarCore),
            address(afc),
            admin,  // protocolTreasury
            admin   // lpPool (mock)
        );
        
        // 创建测试分身
        vm.prank(user);
        avatarCore.createAvatar(soulId, keccak256("test cognition"));
        
        // 授权代币
        usdc.mint(user, 1000e6);
        vm.prank(user);
        usdc.approve(address(splitter), type(uint256).max);
    }
    
    function test_ExecuteSplit_NormalCase() public {
        vm.prank(user);
        DynamicSplitter.SplitResult memory result = splitter.executeSplit(
            soulId,
            100e6,      // $100 USDC
            5           // task complexity
        );
        
        // 验证基础分配
        assertEq(result.humanShare, 70e6);      // 70%
        assertEq(result.avatarShare, 20e6);     // 20%
        assertEq(result.protocolShare, 10e6);   // 10%
    }
    
    function test_ExecuteSplit_HighResonanceBonus() public {
        // 设置高共振分（>70）
        oracle.setResonance(soulId, 85);
        vm.prank(address(oracle));
        splitter.updateResonanceScore(soulId, 85);
        
        vm.prank(user);
        DynamicSplitter.SplitResult memory result = splitter.executeSplit(
            soulId,
            100e6,
            3  // low complexity
        );
        
        // 共振高 → 人类份额增加
        assertGt(result.humanShareBps, 7000);
        assertLt(result.avatarShareBps, 2000);
    }
    
    function test_ExecuteSplit_LowResonancePenalty() public {
        // 设置低共振分（<70）
        oracle.setResonance(soulId, 55);
        vm.prank(address(oracle));
        splitter.updateResonanceScore(soulId, 55);
        
        vm.prank(user);
        DynamicSplitter.SplitResult memory result = splitter.executeSplit(
            soulId,
            100e6,
            8  // high complexity
        );
        
        // 共振低+高复杂度 → 金库比例提升
        assertGe(result.avatarShareBps, 2000);
    }
    
    function test_Revert_ZeroAmount() public {
        vm.prank(user);
        vm.expectRevert("Zero amount");
        splitter.executeSplit(soulId, 0, 1);
    }
    
    function test_Revert_NotOwner() public {
        address attacker = makeAddr("attacker");
        vm.prank(attacker);
        vm.expectRevert("Not owner");
        splitter.executeSplit(soulId, 100e6, 1);
    }
    
    function test_TreasuryBps_Clamp() public view {
        // 测试clamp边界
        uint256 low = splitter.calculateTreasuryBps(soulId, 1, 10);  // 极低共振+高复杂度
        uint256 high = splitter.calculateTreasuryBps(soulId, 100, 1); // 极高共振+低复杂度
        
        assertGe(low, 1500);  // >=15%
        assertLe(high, 2500); // <=25%
    }
}
