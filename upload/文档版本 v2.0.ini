# AA_功能集成说明.md

> **文档版本**: v2.0 | **架构师视角**: 全球顶级全栈架构标准 | **适用场景**: 跨模块集成、协议对接、数据流治理、生产级部署

## 1. 架构分层与集成拓扑
本系统采用 **垂直业务解耦 × 水平协议互通** 的分层集成架构。各层通过标准化接口契约通信，确保单点演进不影响全局。

```
[ 表现层 ] Next.js 15 (App Router) + React 19 + TailwindCSS + i18n/a11y
      │ 集成: Wagmi v2 / Viem 2 / x402-JS SDK / Web Vitals 采集器
      ▼
[ 网关/路由层 ] Edge Middleware (Next.js) + API Routes + The Graph 子图查询
      │ 集成: 权限校验 / 缓存策略(SWR) / 限流 / GEO Speakable 注入
      ▼
[ 业务逻辑层 ] Off-chain Engine (Rust/Go) + LangGraph/CrewAI 多智能体编排
      │ 集成: MCP Server / ECE 预言机客户端 / IFD 权重计算器 / PoUE ZK Prover
      ▼
[ 链上合约层 ] Base L2 (Solidity 0.8.28) + OpenZeppelin v5 + UUPS 代理模式
      │ 模块: AvatarCore / DynamicSplitter / SkillVault / CircuitGuard / IFDRouter / TokenVault
      ▼
[ 存储/共识层 ] IPFS/Arweave (分片加密) + Base RPC + ECE 多签网络
```

## 2. 核心模块集成规范

### 2.1 认知身份系统 (AvatarCore + .soul SBT)
- **集成点**: 钱包签名 → DID 12720 映射 → ERC-721 SBT 铸造 → IPFS 认知根哈希绑定
- **契约**: `createAvatar(soulId, cognitionRootHash)` 触发 `AvatarCreated` 事件
- **数据流**: 前端采集基线 → 本地生成 Merkle Root → 调用合约 → 返回 `soulId` → 写入本地 IndexedDB
- **验收**: 注册成功率 ≥ 99.9%，SBT 铸造 Gas < 0.002 ETH，状态根不可篡改

### 2.2 动态分账系统 (DynamicSplitter + x402)
- **集成点**: HTTP x402 支付流 → 链上分账路由 → 70/20/10 自动清算 → AFC 回购
- **契约**: `executeSplit(soulId, amount, complexity)` 保证 `humanBps + avatarBps + protocolBps == 10000`
- **动态逻辑**: 金库比例 = `clamp(2000 + (70 - R) * 50 + complexity * 100, 1500, 2500)`
- **集成约束**: 分账守恒律需通过 Certora 形式化验证；x402 失败重试需支持指数退避

### 2.3 技能解锁系统 (SkillVault + MCP)
- **集成点**: 收益阈值达标 → 链上状态翻转 → LangGraph 节点动态注册 → MCP `tools/list` 更新
- **契约**: `unlockSkill(soulId, tier)` 需校验 `cumulativeRevenue >= threshold`
- **事件驱动**: 解锁成功后广播 `SkillUnlocked`，前端实时刷新技能市场，MCP Server 热加载新 Agent 能力

### 2.4 认知熔断系统 (CircuitGuard)
- **集成点**: ECE 共振分输入 → 状态机评估 → 高风险操作拦截 → 多签/流体民主恢复
- **状态迁移**: `NORMAL(≥70) → SOFT_LIMIT(50-69) → HARD_PAUSE(<50) → RECOVERY(72h)`
- **集成策略**: 采用 **策略模式** 封装熔断规则，支持热插拔；拦截日志实时推送至 Superset 安全看板

### 2.5 个体流体民主 (IFD Router)
- **集成点**: 委托关系链上提交 → 权重计算引擎(链下Rust) → ECE 情感过滤 → 治理提案执行
- **数学契约**: `W = λ₁C + λ₂H + λ₃R + λ₄T - λ₅D`，归一化后 BPS 映射
- **性能要求**: 委托撤销 O(1) 状态同步；权重计算延迟 < 500ms；支持 Merkle Root 快照防闪电贷攻击

### 2.6 GEO 与生成式引擎优化
- **集成点**: 内容输出 → `extractSpeakableSegments()` → 上链标注 → x402 引用结算
- **契约**: `createMarkup(soulId, outputHash, segments)` 限制 3-4 片段
- **集成流**: AI 引用 → 触发 x402 支付 → `recordCitation()` → 更新权威信号 → 提升 ECE 共振分

## 3. 外部协议与基础设施集成

| 协议/组件 | 集成方式 | 数据格式 | 降级/容灾策略 |
|-----------|----------|----------|---------------|
| **x402 微支付** | HTTP Header + 链上结算路由 | JSON-LD / EIP-712 | 路由失败切换备用通道，队列重试 |
| **MCP 协议** | stdio/HTTP 双向流 | JSON-RPC 2.0 | 超时降级至本地缓存技能，标记重试 |
| **LangGraph/CrewAI** | 异步任务编排 | Pydantic Models | 节点失败触发回滚，记录至 IPFS |
| **IPFS/Arweave** | W3Auth 上传 / Pinning Service | CID v1 (Base32) | 本地缓存 + 多节点冗余 Pin |
| **The Graph** | 子图索引链上事件 | GraphQL | 节点延迟时 fallback 至 RPC 原始查询 |
| **ECE 预言机** | 3/5 多签签名验证 | EIP-712 Structured Data | 节点作恶触发 Slasher，备用预言机接管 |

## 4. 前后端与链上交互流 (标准时序)
1. **用户触发** → 前端签名请求 (Wagmi) → 钱包确认 (ERC-6492)
2. **链下预检** → Middleware 校验 Gas/Nonce/风控 → 提交 Off-chain Engine
3. **引擎计算** → 权重/分账/技能路由计算 → 生成 Merkle Proof + EIP-712 Payload
4. **合约调用** → `sendTransaction` → 等待确认 (Tx Receipt)
5. **事件监听** → The Graph / WebSocket → 前端状态更新 (SWR/Zustand)
6. **异步结算** → x402 路由执行 → 金库自动回购 → Superset 指标刷新

## 5. 安全、隐私与合规集成接口
- **数据主权**: 原始认知数据本地加密 (WebCrypto API)，仅 CID 上链
- **ZK 验证预留**: `verifyPoUEProof(merkleRoot, π)` 接口预留，支持后续接入 Halo2/Noir
- **合规模块**: 插件化设计 (`KYCPlugin`, `TaxLabelPlugin`, `GeoCompliancePlugin`)，默认关闭，流体民主投票激活
- **审计追踪**: 所有状态变更通过 EIP-712 签名存证，支持不可抵赖性验证

## 6. 性能与可观测性集成标准
- **前端性能**: FCP < 1.2s, LCP < 2.0s, INP ≤ 150ms, CLS < 0.05
- **链上交互**: 钱包连接 < 1.5s, SBT 加载 < 1.0s, Tx 确认反馈 < 2.0s
- **监控体系**: Prometheus 采集链下指标 + Grafana 可视化 + Alertmanager 告警路由
- **日志规范**: 结构化 JSON (OpenTelemetry)，链上事件与链下 TraceID 关联

> **集成铁律**: 模块间仅通过契约接口通信；禁止跨层直接调用数据库或合约；所有外部依赖必须提供 Mock 接口供测试。
```

```markdown
# BB_技术实现标准与路径任务清单.md

> **文档版本**: v2.0 | **工程标准**: 哈佛级路演 / Certora 审计就绪 / 全球最佳实践 | **负责人**: 全栈架构组

## 1. 全局技术栈选型标准 (2025+ 最佳实践)

| 层级 | 技术选型 | 版本/规范 | 选型依据 |
|------|----------|-----------|----------|
| **前端框架** | Next.js 15 (App Router) | React 19 + Server Actions | 边缘计算、流式渲染、SEO/GEO 原生支持 |
| **状态管理** | Zustand + SWR | 轻量级、乐观更新 | 替代 Redux，适合链上异步数据同步 |
| **Web3 交互** | Wagmi v2 + Viem 2 | TypeScript 严格模式 | 类型安全、Hook 驱动、Gas 预估优化 |
| **样式系统** | TailwindCSS 4 + Radix UI | CSS Variables + 组件无感集成 | 高性能、设计令牌(D1)直接映射 |
| **智能合约** | Solidity 0.8.28 + Foundry | UUPS Proxy + OpenZeppelin 5.1 | 极致安全、原生 Rust 测试器、Gas 优化 |
| **链下引擎** | Rust (Actix + Tokio) | 高并发、零内存泄漏 | PoUE ZK 计算、IFD 权重聚合、MCP 路由 |
| **索引与数据** | The Graph + PostgreSQL | Subgraph v2 + TimescaleDB | 实时事件索引、时序数据优化 |
| **可视化监控** | Superset + Prometheus + Grafana | 自定义面板 + Webhook 告警 | 商业级数据看板、SRE 可观测性 |
| **存储层** | IPFS (Pinata/Lighthouse) + Arweave | 分片加密 + CID v1 | 去中心化存储、记忆永生保障 |
| **CI/CD** | GitHub Actions + Cloudflare | 自动化测试/部署/边缘缓存 | 生产级流水线、零停机发布 |

## 2. 架构与工程规范

### 2.1 Monorepo 目录结构
```
afc-avatar-protocol/
├── contracts/          # Solidity 合约 + Foundry 测试 + 部署脚本
├── engine/             # Rust 链下计算引擎 (PoUE/IFD/MCP)
├── frontend/           # Next.js 15 控制台 + Storybook 组件库
├── infra/              # Docker Compose / Terraform / 监控配置
├── scripts/            # 自动化种子注入/审计前置/GEO 集成脚本
├── docs/               # 架构文档 / API 规范 / 审计清单
└── .github/            # CI/CD 工作流 (CI / Deploy / Audit)
```

### 2.2 合约开发规范
- **代理模式**: 严格使用 `UUPSUpgradeable`，核心逻辑与存储分离
- **安全基线**: `ReentrancyGuard`, `AccessControl`, `Pausable`, 权限分离 (Admin/Oracle/Guardian)
- **Gas 优化**: `unchecked` 安全运算、位运算替代除法、状态变量紧凑存储 (Storage Packing)
- **形式化不变量**: 分账守恒、权重归一化、熔断拦截、PoUE 单调衰减

### 2.3 前端工程规范
- **架构**: App Router 服务端渲染 + 客户端水合，严格 TypeScript (`strict: true`)
- **无障碍**: WCAG 2.1 AA 标准，语义化 HTML，键盘导航，减少动画 (prefers-reduced-motion)
- **国际化**: `next-intl` 路由级按需加载，支持 8 种语言，日期/货币本地化
- **性能预算**: 首屏 JS < 150KB, 图片 WebP/AVIF, 字体子集化, 静态资源 CDN 缓存 1 年

## 3. 分阶段实施路径 (Phase-Gated)

| 阶段 | 周期 | 核心目标 | 交付物 | 门禁指标 (Go/No-Go) |
|------|------|----------|--------|---------------------|
| **Phase 0** | W1-W2 | 基建跑通 & 核心合约部署 Base Sepolia | Monorepo 初始化 / Core 合约 / ECE Mock / x402 沙盒 / The Graph 子图 | CI 绿色 / 覆盖率 ≥ 90% / 支付成功率 100% |
| **Phase 1** | W3-W4 | MVP 产品 & 100 创作者冷启动 | IFD 界面 / SkillVault / CircuitGuard 演练 / Superset 看板 / 分身市场灰度 | 端到端成功率 ≥ 95% / 首笔收益 ≤ 14天 / 激活率 ≥ 85% |
| **Phase 2** | W5-W6 | 安全审计 & 主网准备 | Certora 形式化验证 / Trail of Bits 静态审计 / LP 注入 $50K / 合规插件 | 审计 0 Critical / 30日留存 ≥ 70% / NPS ≥ 60 |
| **Phase 3** | W7-W10 | AFC 主网 & 生态扩展 | Base 1:1 状态迁移 / ZK-ML 验证器原型 / 企业 SDK / DECP 跨链预研 | TPS 达标 / Gas < $0.01 / 3 家企业 Pilot 合同 |

