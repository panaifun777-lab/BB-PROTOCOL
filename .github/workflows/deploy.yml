# =============================================================================
# Deploy Pipeline — Cognitive Avatar Protocol
# =============================================================================
# Triggers: push to main (after CI passes)
# Jobs: deploy-staging → deploy-production (manual approval)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.1.38"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      deployment-id: ${{ steps.deploy.outputs.deployment-id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=staging-
            type=ref,event=branch
            type=raw,value=staging-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS Staging
        id: deploy
        run: |
          CLUSTER="cognitive-avatar-staging"
          SERVICE="cognitive-avatar-staging-svc"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-$(echo ${{ github.sha }} | cut -c1-7)"

          echo "Deploying image: ${IMAGE} to cluster: ${CLUSTER}"

          # Get current task definition
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "Current task definition: ${TASK_DEF_ARN}"

          # Get task definition JSON
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition')

          # Update image in task definition
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | jq \
            --arg IMAGE "${IMAGE}" \
            '.containerDefinitions[0].image = $IMAGE |
             .containerDefinitions[0].environment |= map(
               if .name == "VERSION" then .value = $IMAGE else . end
             )')

          # Remove fields that can't be passed to register-task-definition
          NEW_TASK_DEF=$(echo "${NEW_TASK_DEF}" | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: ${NEW_TASK_DEF_ARN}"

          # Update service with new task definition
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment

          DEPLOYMENT_ID="staging-$(date +%Y%m%d%H%M%S)"
          echo "deployment-id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT
          echo "✓ Staging deployment initiated: ${DEPLOYMENT_ID}"

      - name: Wait for ECS deployment stabilization
        run: |
          CLUSTER="cognitive-avatar-staging"
          SERVICE="cognitive-avatar-staging-svc"

          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --timeout 600

          echo "✓ Staging service is stable"

      - name: Run smoke tests
        run: |
          STAGING_URL="${{ vars.STAGING_URL || 'https://staging.cognitive-avatar.protocol' }}"
          echo "Running smoke tests against: ${STAGING_URL}"

          # Health check
          STATUS=$(curl -sf "${STAGING_URL}/api/health" | jq -r '.status')
          if [ "$STATUS" = "ok" ]; then
            echo "✓ Health check passed"
          else
            echo "::error::Health check failed: status=${STATUS}"
            exit 1
          fi

          # Key API endpoints
          declare -a endpoints=(
            "/api/dashboard"
            "/api/avatars"
            "/api/skills"
            "/api/revenues"
            "/api/security"
            "/api/monitoring"
          )

          for endpoint in "${endpoints[@]}"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}${endpoint}")
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✓ ${endpoint} → ${HTTP_CODE}"
            else
              echo "::error::Smoke test failed: ${endpoint} → ${HTTP_CODE}"
              exit 1
            fi
          done

          # Check response time
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" "${STAGING_URL}/api/health")
          echo "Health endpoint response time: ${RESPONSE_TIME}s"

          # Fail if response time > 5 seconds
          if (( $(echo "${RESPONSE_TIME} > 5.0" | bc -l) )); then
            echo "::warning::Response time exceeded 5s threshold: ${RESPONSE_TIME}s"
          fi

          echo "✓ All smoke tests passed!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✓ Staging deployment successful"
          else
            echo "✗ Staging deployment failed"
          fi

  # ── Job 2: Deploy to Production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    timeout-minutes: 45
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote staging image to production
        run: |
          STAGING_TAG="staging-$(echo ${{ github.sha }} | cut -c1-7)"
          PRODUCTION_TAG="production-$(echo ${{ github.sha }} | cut -c1-7)"

          SOURCE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${STAGING_TAG}"
          TARGET_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${PRODUCTION_TAG}"
          LATEST_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          echo "Promoting image: ${SOURCE_IMAGE} → ${TARGET_IMAGE}"

          # Pull staging image, tag for production, and push
          docker pull "${SOURCE_IMAGE}"
          docker tag "${SOURCE_IMAGE}" "${TARGET_IMAGE}"
          docker tag "${SOURCE_IMAGE}" "${LATEST_IMAGE}"
          docker push "${TARGET_IMAGE}"
          docker push "${LATEST_IMAGE}"

          echo "✓ Image promoted to production"

      - name: Deploy to ECS Production
        run: |
          CLUSTER="cognitive-avatar-production"
          SERVICE="cognitive-avatar-production-svc"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-$(echo ${{ github.sha }} | cut -c1-7)"

          echo "Deploying image: ${IMAGE} to cluster: ${CLUSTER}"

          # Get current task definition
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --query 'services[0].taskDefinition' \
            --output text)

          # Get task definition JSON
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition')

          # Update image and environment
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | jq \
            --arg IMAGE "${IMAGE}" \
            '.containerDefinitions[0].image = $IMAGE |
             .containerDefinitions[0].environment |= map(
               if .name == "VERSION" then .value = $IMAGE else . end
             )')

          # Remove non-registerable fields
          NEW_TASK_DEF=$(echo "${NEW_TASK_DEF}" | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update service
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment

          echo "✓ Production deployment initiated"

      - name: Wait for production deployment stabilization
        run: |
          CLUSTER="cognitive-avatar-production"
          SERVICE="cognitive-avatar-production-svc"

          echo "Waiting for production service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --timeout 900

          echo "✓ Production service is stable"

      - name: Production health check
        run: |
          PRODUCTION_URL="${{ vars.PRODUCTION_URL || 'https://cognitive-avatar.protocol' }}"
          echo "Running production health check against: ${PRODUCTION_URL}"

          # Health endpoint with detailed check
          HEALTH_RESPONSE=$(curl -sf "${PRODUCTION_URL}/api/health")

          STATUS=$(echo "${HEALTH_RESPONSE}" | jq -r '.status')
          VERSION=$(echo "${HEALTH_RESPONSE}" | jq -r '.version')

          if [ "$STATUS" = "ok" ]; then
            echo "✓ Production health check passed"
            echo "  Version: ${VERSION}"
          else
            echo "::error::Production health check failed: status=${STATUS}"
            exit 1
          fi

          # Verify all services are healthy
          SERVICES_STATUS=$(echo "${HEALTH_RESPONSE}" | jq -r '.services')
          echo "Services status: ${SERVICES_STATUS}"

          UNHEALTHY=$(echo "${HEALTH_RESPONSE}" | jq -r '.services | to_entries[] | select(.value != "ok" and .value != "healthy") | .key')
          if [ -n "$UNHEALTHY" ]; then
            echo "::warning::Unhealthy services detected: ${UNHEALTHY}"
          fi

          # Response time check
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" "${PRODUCTION_URL}/api/health")
          echo "Health endpoint response time: ${RESPONSE_TIME}s"

          if (( $(echo "${RESPONSE_TIME} > 3.0" | bc -l) )); then
            echo "::warning::Production response time exceeded 3s threshold: ${RESPONSE_TIME}s"
          fi

          # Uptime check
          UPTIME=$(echo "${HEALTH_RESPONSE}" | jq -r '.uptime')
          echo "Service uptime: ${UPTIME}"

          echo "✓ Production health check complete!"

      - name: Notify production deployment
        if: always()
        run: |
          DEPLOY_STATUS="${{ job.status }}"
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          if [ "${DEPLOY_STATUS}" = "success" ]; then
            echo "✓ Production deployment successful for commit ${COMMIT_SHA}"
          else
            echo "✗ Production deployment FAILED for commit ${COMMIT_SHA}"
            echo "::warning::Consider rolling back if issues persist"
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          CLUSTER="cognitive-avatar-production"
          SERVICE="cognitive-avatar-production-svc"

          echo "::warning::Production deployment failed. Initiating rollback..."

          # Get the previous task definition (one before latest)
          PREVIOUS_TASK_DEF=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --query 'services[0].deployments | sort_by(.createdAt) | [-2].taskDefinition' \
            --output text 2>/dev/null || echo "")

          if [ -n "${PREVIOUS_TASK_DEF}" ] && [ "${PREVIOUS_TASK_DEF}" != "None" ]; then
            echo "Rolling back to previous task definition: ${PREVIOUS_TASK_DEF}"
            aws ecs update-service \
              --cluster "${CLUSTER}" \
              --service "${SERVICE}" \
              --task-definition "${PREVIOUS_TASK_DEF}" \
              --force-new-deployment
            echo "✓ Rollback initiated"
          else
            echo "::error::Could not determine previous task definition for rollback. Manual intervention required."
          fi
