# 🛡️ Trail of Bits Threat Model: Web4.0 Cognitive Avatar Protocol
**Version**: 1.0 | **Date**: May 2026 | **Author**: Security Architecture Team

## 1. System Boundaries
- **On-Chain**: Base L2 (Proxy contracts, IFD, Splitter, Guard, PoUE)
- **Off-Chain**: ECE Oracle (multi-sig), IFD Engine (Rust/Go), PoUE ZK Prover
- **Storage**: IPFS/Arweave (encrypted cognitive logs), The Graph (indexing)
- **Trust Assumptions**: Oracle honest-majority, Users control private keys, TEE/ZK for entity binding

## 2. Attack Surface (STRIDE Mapping)
| STRIDE Vector | Threat Scenario | Impact | Mitigation |
|---------------|----------------|--------|------------|
| **Spoofing** | Fake `.soul` SBT minting to claim PoUE weight | High | Hardware TEE binding + ZK-KYC proof verification |
| **Tampering** | Manipulate IFD weights via flash-loan snapshot | Critical | 72h voting freeze + Merkle root snapshot locking |
| **Repudiation** | User denies high-risk action after execution | Medium | On-chain action logs + EIP-712 signature receipts |
| **Information Disclosure** | Leak cognitive baseline / resonance data | High | IPFS client-side encryption + ZK weight aggregation |
| **DoS** | Flood ECE oracle with spoofed emotional signals | Medium | Slasher mechanism + rate-limited sliding window |
| **Elevation of Privilege** | Bypass CircuitGuard via reentrancy | Critical | `ReentrancyGuard` + state machine guard checks |

## 3. Security Controls Matrix
| Control Layer | Implementation | Audit Scope |
|---------------|----------------|-------------|
| Cryptographic | EIP-712, ZK-SNARK (PoUE), ECDSA (Oracle) | Certora + Manual Review |
| Economic | 70/20/10 split invariants, treasury auto-buy logic | Economic Model Stress Test |
| Governance | IFD domain isolation, instant revocation, veto right | Formal Invariant Proof |
| Operational | Multi-sig upgrades, 48h time-lock, monitoring alerts | Runbook + Incident Response |

## 4. Assumptions & Limitations
- ECE oracle assumes ≥3/5 honest nodes with sliding consensus
- PoUE ZK circuit size < 1.5M constraints for on-chain verification feasibility
- User cognitive baseline is self-reported initially, validated over time via ECE
- Protocol does not guarantee financial returns; AFC is strictly utility/governance fuel

## 5. Next Steps (Pre-Audit Checklist)
