## 🔗 交付物2：前端TypeScript SDK（Wagmi + x402集成）

```typescript
// sdk/src/cognitive-markup.ts
import { useWriteContract, usePublicClient } from 'wagmi'
import { parseAbiItem } from 'viem'
import { x402 } from 'x402-js'
import { baseSepolia } from 'viem/chains'

// 合约ABI（精简，完整见合约输出）
const COGNITIVE_MARKUP_ABI = [
  parseAbiItem('function createMarkup(uint256,bytes32,(bytes32,uint256,uint256,string,uint256,uint256)[]) external returns (bytes32)'),
  parseAbiItem('function recordCitation(uint256,bytes32,bytes) external returns (bool)'),
  parseAbiItem('event ContentCited(uint256 indexed,bytes32 indexed,address,uint256,uint256)'),
] as const

export interface SpeakableSegment {
  contentHash: `0x${string}`  // IPFS哈希
  startOffset: bigint          // 起始位置
  endOffset: bigint            // 结束位置
  semanticTag: 'skill_definition' | 'use_case' | 'evidence' | 'tutorial'
  citationCount?: bigint       // 可选：链上计数
}

export interface MarkupOptions {
  soulId: bigint
  outputHash: `0x${string}`    // 输出内容IPFS哈希
  segments: SpeakableSegment[] // 3-4个高价值段落
  domain?: string              // 认知领域（用于索引）
}

/**
 * Hook: 创建Speakable标注并上链
 * @returns { createMarkup, isPending, error }
 */
export function useCreateMarkup() {
  const { writeContractAsync, isPending, error } = useWriteContract()
  const publicClient = usePublicClient()

  const createMarkup = async (options: MarkupOptions) => {
    // 1. 验证片段数量（3-4个）
    if (options.segments.length < 3 || options.segments.length > 4) {
      throw new Error('Speakable segments must be 3-4 for optimal AI citation')
    }

    // 2. 提取高信息密度段落（前端辅助）
    const enrichedSegments = options.segments.map(seg => ({
      ...seg,
      // 可选：前端预计算语义相似度分数
      relevanceScore: _computeRelevance(seg.semanticTag, options.domain)
    }))

    // 3. 调用合约
    const hash = await writeContractAsync({
      address: process.env.NEXT_PUBLIC_MARKUP_ADDR as `0x${string}`,
      abi: COGNITIVE_MARKUP_ABI,
      functionName: 'createMarkup',
      args: [
        options.soulId,
        options.outputHash,
        enrichedSegments.map(s => [
          s.contentHash,
          s.startOffset,
          s.endOffset,
          s.semanticTag,
          0n, // citationCount初始0
          0n  // lastCitedAt初始0
        ])
      ],
      chain: baseSepolia,
    })

    // 4. 等待确认（可选）
    const receipt = await publicClient?.waitForTransactionReceipt({ hash })
    
    // 5. 解析事件获取markupRoot
    const logs = receipt?.logs.filter(log => 
      log.topics[0] === '0x' + keccak256('MarkupCreated(uint256,bytes32,bytes32,uint256)')
    )
    const markupRoot = logs?.[0]?.topics[3] as `0x${string}` | undefined

    return { hash, markupRoot, receipt }
  }

  return { createMarkup, isPending, error }
}

/**
 * Hook: 记录引用并触发x402结算
 * @returns { recordCitation, isPending, error }
 */
export function useRecordCitation() {
  const { writeContractAsync, isPending, error } = useWriteContract()

  const recordCitation = async (
    soulId: bigint,
    segmentHash: `0x${string}`,
    paymentAmount: number // USD金额
  ) => {
    // 1. 创建x402支付证明
    const payment = await x402.createPayment({
      amount: paymentAmount,
      currency: 'USDC',
      recipient: process.env.NEXT_PUBLIC_MARKUP_ADDR as `0x${string}`,
      metadata: {
        soulId: soulId.toString(),
        segmentHash,
        citationType: 'ai_reference'
      }
    })

    // 2. 用户签名（钱包）
    const signature = await x402.signPayment(payment)

    // 3. 调用合约记录引用
    const hash = await writeContractAsync({
      address: process.env.NEXT_PUBLIC_MARKUP_ADDR as `0x${string}`,
      abi: COGNITIVE_MARKUP_ABI,
      functionName: 'recordCitation',
      args: [soulId, segmentHash, signature],
      chain: baseSepolia,
    })

    return { hash, payment, signature }
  }

  return { recordCitation, isPending, error }
}

/**
 * 工具：前端提取Speakable段落（启发式）
 * @param content 完整文本
 * @param options 配置
 * @returns SpeakableSegment[] (3-4个)
 */
export function extractSpeakableSegments(
  content: string,
  options: {
    minWords?: number    // 最小词数（默认40）
    maxSegments?: number // 最大片段数（默认4）
    semanticHints?: string[] // 语义提示词
  } = {}
): SpeakableSegment[] {
  const { minWords = 40, maxSegments = 4, semanticHints = [] } = options
  
  // 1. 分句
  const sentences = content.split(/[.!?]+/).filter(s => s.trim().length > 0)
  
  // 2. 评分：信息密度 + 语义匹配 + 位置权重
  const scored = sentences.map((sentence, idx) => {
    const words = sentence.trim().split(/\s+/).length
    const densityScore = words >= minWords ? 1 : words / minWords
    const semanticScore = semanticHints.some(hint => 
      sentence.toLowerCase().includes(hint.toLowerCase())
    ) ? 1.5 : 1
    const positionScore = idx < 3 ? 1.2 : idx > sentences.length - 4 ? 1.1 : 1 // 首尾加权
    return {
      sentence,
      score: densityScore * semanticScore * positionScore,
      startOffset: content.indexOf(sentence),
      endOffset: content.indexOf(sentence) + sentence.length
    }
  })

  // 3. 取Top-N
  const top = scored.sort((a, b) => b.score - a.score).slice(0, maxSegments)

  // 4. 转换为SpeakableSegment
  return top.map(item => ({
    contentHash: `0x${Buffer.from(item.sentence).toString('hex').padEnd(64, '0')}` as `0x${string}`, // 简化：实际应IPFS上传
    startOffset: BigInt(item.startOffset),
    endOffset: BigInt(item.endOffset),
    semanticTag: _inferSemanticTag(item.sentence, semanticHints)
  }))
}

// 内部工具函数
function _computeRelevance(tag: string, domain?: string): number {
  // 简化：实际应使用嵌入模型计算
  const relevanceMap: Record<string, number> = {
    'skill_definition': 1.0,
    'use_case': 0.9,
    'evidence': 0.85,
    'tutorial': 0.8
  }
  return relevanceMap[tag] || 0.7
}

function _inferSemanticTag(sentence: string, hints: string[]): SpeakableSegment['semanticTag'] {
  const lower = sentence.toLowerCase()
  if (hints.some(h => lower.includes(h))) return 'skill_definition'
  if (lower.includes('example') || lower.includes('use')) return 'use_case'
  if (lower.includes('because') || lower.includes('evidence')) return 'evidence'
  return 'tutorial'
}

function keccak256(data: string): string {
  // 简化：实际应使用viem/utils
  return '0x' + Buffer.from(data).toString('hex').slice(0, 64)
}
```

> ✅ **SDK特性**：
> - Wagmi Hook封装，与现有前端架构无缝集成
