### 🐍 `generate_pitch_deck.py`
```python
from pptx import Presentation
from pptx.util import Inches, Pt
from pptx.enum.text import PP_ALIGN
from pptx.dml.color import RGBColor

prs = Presentation()
prs.slide_width = Inches(13.333)
prs.slide_height = Inches(7.5)

# 配色方案 (Web4.0 认知蓝/神性紫)
PRIMARY = RGBColor(59, 130, 246)   # #3B82F6
SECONDARY = RGBColor(139, 92, 246) # #8B5CF6
ACCENT = RGBColor(16, 185, 129)    # #10B981
DARK_BG = RGBColor(15, 23, 42)     # #0F172A
LIGHT_TEXT = RGBColor(248, 250, 252)

def add_slide(title, bullets, notes, chart_placeholder=""):
    slide = prs.slides.add_slide(prs.slide_layouts[1])  # Title & Content layout
    slide.background.fill.solid()
    slide.background.fill.fore_color.rgb = DARK_BG
    
    # Title
    title_shape = slide.shapes.title
    title_shape.text = title
    title_shape.text_frame.paragraphs[0].font.color.rgb = PRIMARY
    title_shape.text_frame.paragraphs[0].font.size = Pt(32)
    title_shape.text_frame.paragraphs[0].font.bold = True
    
    # Content
    body = slide.shapes.placeholders[1]
    tf = body.text_frame
    tf.clear()
    for i, bullet in enumerate(bullets):
        p = tf.add_paragraph() if i > 0 else tf.paragraphs[0]
        p.text = bullet
        p.font.color.rgb = LIGHT_TEXT
        p.font.size = Pt(18)
        p.space_after = Pt(12)
        
    # Notes
    slide.notes_slide.notes_text_frame.text = notes

