### 🌐 `.github/workflows/ci.yml`（CI/CD 流水线）
```yaml
name: Web4.0 Protocol CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Install dependencies
        run: cd contracts && forge install
      - name: Format check
        run: cd contracts && forge fmt --check
      - name: Build
        run: cd contracts && FOUNDRY_PROFILE=audit forge build
      - name: Run tests + coverage
        run: cd contracts && forge coverage --report lcov --report summary
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./contracts/lcov.info
          flags: contracts
          fail_ci_if_error: true

  static-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: crytic/slither-action@v0.4.0
        with:
          target: "contracts/src"
          slither-args: "--exclude-informational --exclude-optimization --checklist"
          fail-on: "high"
          sarif: results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  gas-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Generate gas report
        run: cd contracts && forge test --gas-report > gas_report.md
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('./contracts/gas_report.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ⛽ Gas Optimization Report\n\`\`\`bash\n${report}\`\`\``
            });
```

### 🌐 `.github/workflows/deploy-base.yml`（安全部署）
```yaml
name: Deploy to Base
on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: base-mainnet
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install deps & build
        run: cd contracts && forge install && FOUNDRY_PROFILE=base-mainnet forge build
      - name: Deploy Proxy + Initialize
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PK }}
          BASE_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
          ADMIN_ADDR: ${{ secrets.ADMIN_ADDR }}
          ECE_ORACLE: ${{ secrets.ECE_ORACLE_ADDR }}
          AFC_TOKEN: ${{ secrets.AFC_TOKEN_ADDR }}
        run: |
          cd contracts
          forge script script/DeployProxy.s.sol \
            --rpc-url $BASE_RPC_URL \
            --private-key $DEPLOYER_PRIVATE_KEY \
            --broadcast \
            --verify \
            --etherscan-api-key ${{ secrets.BASESCAN_API_KEY }} \
            --verifier-url https://api.basescan.org/api
```

> 💡 **使用**：保存至 `.github/workflows/`，配置 Secrets 后，每次 PR 自动触发测试/覆盖/静态分析；打 `v*` 标签自动部署至 Base 主网并验证源码。

