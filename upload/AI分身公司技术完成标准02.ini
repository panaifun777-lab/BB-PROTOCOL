## 3. 形式化数学模型（Formal Mathematical Model）

### 定义 1：认知权重函数 $W_{i,d}(t)$
$$
W_{i,d}(t) = \lambda_1 C_{i,d}(t) + \lambda_2 H_i(t) + \lambda_3 R_i(t) + \lambda_4 T_i(t) - \lambda_5 D_i(t)
$$
**约束条件**：
- $\sum_{k=1}^5 \lambda_k = 1, \quad \lambda_k \in [0,1]$
- $C_{i,d}(t) \in [0,1]$: 领域认知匹配度（技能向量余弦相似度）
- $H_i(t) \in [0,1]$: 历史贡献归一化值 $\frac{\sum_{k=1}^t \text{quality}_k \cdot \text{weight}_k}{\max(\text{contribution})}$
- $R_i(t) \in [0,1]$: 情绪共振分（ECE 输出 / 100）
- $T_i(t) \in [0,1]$: 近期表现（过去 7 天成功率 × 时效衰减）
- $D_i(t) = \gamma \cdot \frac{t - t_{last\_action}}{t_{max}}$: 时间衰减惩罚，$\gamma \in [0.05, 0.15]$

**归一化输出**：
$$
\tilde{W}_{i,d}(t) = \frac{\max(0, W_{i,d}(t))}{\sum_{j \in \mathcal{A}_d} \max(0, W_{j,d}(t))}
$$

### 定理 1：动态均衡性与抗刷票性质（Lyapunov 稳定性）
**命题**：在连续任务流假设下，若 $\gamma > 0$，则系统权重分布 $\tilde{W}(t)$ 渐近收敛至稳定区间 $[W_{min}, W_{max}]$，且对 Sybil 攻击具有鲁棒性。

**证明概要**：
构造 Lyapunov 候选函数：
$$
V(\tilde{W}) = \sum_{i \in \mathcal{A}_d} \left( \tilde{W}_{i,d}(t) - \tilde{W}^*_{i,d} \right)^2
$$
其中 $\tilde{W}^*$ 为稳态分布。对时间求导：
$$
\dot{V} = 2 \sum_{i} \left( \tilde{W}_{i,d} - \tilde{W}^*_{i,d} \right) \dot{\tilde{W}}_{i,d}
$$
代入衰减项 $\dot{D}_i(t) = -\frac{\gamma}{t_{max}} < 0$，可得 $\dot{V} \leq 0$。当任务分布平稳时，系统进入李雅普诺夫稳定状态。

**抗 Sybil 证明**：由于 $C_{i,d}(t)$ 依赖链上可验证技能凭证（.soul SBT + ZK 证明），伪造节点无法获得高匹配度。且时间衰减 $D_i(t)$ 使批量注册的空账号权重迅速衰减至 0。

### 定义 2：ECE 情绪共识滤波算子 $\mathcal{F}_{ECE}$
$$
W_{i,d}^{filtered}(t) = W_{i,d}(t) \cdot \left[ 1 - \alpha \cdot \max\left(0, \frac{|R_i(t) - R_{base}|}{R_{threshold}} - 1\right) \right]
$$
**参数**：
- $R_{base}$: 本体初始共振基线（默认 70）
- $R_{threshold}$: 偏离容忍阈值（默认 15）
- $\alpha \in [0.1, 0.4]$: 惩罚强度系数

**行为**：
- 若 $|R_i - R_{base}| \leq R_{threshold}$，权重不变
- 若偏离 > 阈值，权重线性衰减至 $0.6W$
- 若偏离 > $2R_{threshold}$，触发 $\mathcal{C}_{soft}$ 软熔断，投票暂停

### 推论 1：可逆委托与即时状态同步
设委托关系为状态变量 $\delta_{i \to j}(t) \in \{0,1\}$。撤销操作定义为：
$$
\delta'_{i \to j}(t) = \delta_{i \to j}(t) - \Delta, \quad \Delta \in \{0,1\}
$$
**性质**：
1. 链上状态更新为 $O(1)$ 哈希替换，无需等待区块确认（乐观 UI + 最终性同步）
2. 人类主体保留最终否决权 $V_{veto} \in \{0,1\}$，满足 $\forall t, V_{veto} \cdot \tilde{W}_{delegated} = 0$
3. 委托关系不可跨域继承（`content_creation` 权重不可用于 `contract_signing`）

### 引理：AFC 代币效用与经济对齐稳定性
设协议流通量 $S(t)$，内部消耗率 $\eta(t)$，燃烧率 $\theta = 5\%$，金库回购率 $\beta = 20\%$。若：
$$
\frac{d}{dt} \ln S(t) < -\theta \cdot \beta \cdot \frac{I(t)}{S(t)}
$$
则 $S(t)$ 呈渐进衰减，价值捕获率 $\eta = \frac{\text{AFC consumed}}{\text{AFC circulated}}$ 随生态活跃度单调递增。IFD 权重不赋予代币收益权，仅作为计算燃料与治理信号，严格符合 **Utility-Only** 分类。

