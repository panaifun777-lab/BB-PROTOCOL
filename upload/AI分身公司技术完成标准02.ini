### 📊 核心看板模块（Superset SQL模板）

#### 1️⃣ 认知激活看板（Activation Dashboard）
```sql
-- 基线完成率（按创作者层级）
SELECT 
    creator_tier,
    COUNT(CASE WHEN baseline_completed = true THEN 1 END) * 100.0 / COUNT(*) as completion_rate,
    COUNT(*) as total_invited
FROM creator_onboarding
WHERE onboarded_at >= CURRENT_DATE - INTERVAL '7 days'
GROUP BY creator_tier
ORDER BY completion_rate DESC;

-- 注册漏斗分析
SELECT 
    stage,
    COUNT(DISTINCT user_id) as users,
    ROUND(COUNT(DISTINCT user_id) * 100.0 / FIRST_VALUE(COUNT(DISTINCT user_id)) OVER (ORDER BY stage_order), 2) as conversion_rate
FROM (
    SELECT 
        user_id,
        CASE 
            WHEN wallet_connected THEN 'wallet_connected'
            WHEN soul_minted THEN 'soul_minted'
            WHEN baseline_uploaded THEN 'baseline_uploaded'
            WHEN skill_configured THEN 'skill_configured'
        END as stage,
        CASE 
            WHEN wallet_connected THEN 1
            WHEN soul_minted THEN 2
            WHEN baseline_uploaded THEN 3
            WHEN skill_configured THEN 4
        END as stage_order
    FROM user_journey
    WHERE onboarded_at >= CURRENT_DATE - INTERVAL '7 days'
) funnel
GROUP BY stage, stage_order
ORDER BY stage_order;
```

#### 2️⃣ 经济闭环看板（Revenue Dashboard）
```sql
-- 首笔收益中位时间（按层级）
SELECT 
    creator_tier,
    PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY first_revenue_timestamp - onboarded_at) as median_time_to_first_revenue,
    COUNT(*) as creators_with_revenue
FROM creator_revenue
WHERE first_revenue_timestamp IS NOT NULL
    AND onboarded_at >= CURRENT_DATE - INTERVAL '14 days'
GROUP BY creator_tier;

-- 收益分配分布（70/20/10动态验证）
SELECT 
    DATE_TRUNC('day', settlement_timestamp) as day,
    AVG(human_share_bps) as avg_human_bps,
    AVG(avatar_share_bps) as avg_avatar_bps,
    AVG(protocol_share_bps) as avg_protocol_bps,
    COUNT(*) as transactions
FROM revenue_settlements
WHERE settlement_timestamp >= CURRENT_DATE - INTERVAL '30 days'
GROUP BY day
ORDER BY day;

-- 金库自给率（分身自治能力）
SELECT 
    soul_id,
    avatar_treasury_balance / NULLIF(monthly_operational_cost, 0) as self_sufficiency_ratio,
    CASE 
        WHEN avatar_treasury_balance / NULLIF(monthly_operational_cost, 0) >= 0.3 THEN '✅ Healthy'
        WHEN avatar_treasury_balance / NULLIF(monthly_operational_cost, 0) >= 0.15 THEN '⚠️ Warning'
        ELSE '❌ Critical'
    END as status
FROM avatar_economics
WHERE last_updated >= CURRENT_DATE - INTERVAL '1 day';
```

#### 3️⃣ 安全边界看板（Security Dashboard）
```sql
-- 熔断状态分布
SELECT 
    circuit_state,
    COUNT(*) as avatar_count,
    ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (), 2) as percentage
FROM avatar_circuit_status
WHERE last_updated >= CURRENT_DATE - INTERVAL '1 hour'
GROUP BY circuit_state;

-- 软熔断触发原因分析
SELECT 
    trigger_reason,
    COUNT(*) as occurrences,
    AVG(resonance_score_at_trigger) as avg_score,
    AVG(recovery_time_hours) as avg_recovery_time
FROM circuit_breaker_events
WHERE state_changed_to = 'SOFT_LIMIT'
    AND event_timestamp >= CURRENT_DATE - INTERVAL '7 days'
GROUP BY trigger_reason
ORDER BY occurrences DESC;

-- 高风险操作拦截统计
SELECT 
    DATE_TRUNC('day', event_timestamp) as day,
    COUNT(CASE WHEN action_allowed = false AND is_high_risk = true THEN 1 END) as blocked_high_risk,
    COUNT(CASE WHEN action_allowed = true AND is_high_risk = true THEN 1 END) as approved_high_risk
FROM action_audit_logs
WHERE event_timestamp >= CURRENT_DATE - INTERVAL '30 days'
GROUP BY day
ORDER BY day;
```

#### 4️⃣ 增长杠杆看板（Growth Dashboard）
```sql
-- 技能包解锁转化率
SELECT 
    skill_tier,
    revenue_threshold,
    COUNT(CASE WHEN unlocked = true THEN 1 END) * 100.0 / COUNT(*) as unlock_rate,
    AVG(days_to_unlock) as avg_days_to_unlock
FROM skill_unlocks
WHERE revenue_threshold_reached_at >= CURRENT_DATE - INTERVAL '30 days'
GROUP BY skill_tier, revenue_threshold
ORDER BY revenue_threshold;

-- 分身活跃率（30日滚动）
SELECT 
    DATE_TRUNC('day', date) as day,
    COUNT(DISTINCT CASE WHEN last_activity_at >= date - INTERVAL '30 days' THEN soul_id END) * 100.0 / 
    COUNT(DISTINCT soul_id) as active_rate_30d
FROM avatar_activity_daily
WHERE date >= CURRENT_DATE - INTERVAL '60 days'
GROUP BY day
ORDER BY day;

-- 流体民主委托采用率
SELECT 
    domain,
    COUNT(CASE WHEN delegation_active = true THEN 1 END) * 100.0 / COUNT(*) as delegation_rate,
    AVG(delegation_weight) as avg_weight_delegated
FROM ifd_delegations
WHERE created_at >= CURRENT_DATE - INTERVAL '14 days'
GROUP BY domain;
```

