## 1. 理论根基与范式跃迁（Theoretical Foundation）

### 1.1 Web3 治理困境的数学本质
传统 DAO 治理权重 $W_{token} \propto \text{balance}$，导致：
1. **寡头垄断**：Gini系数 > 0.7（DeepDAO, 2025）
2. **认知错配**：持币者缺乏领域专业知识，投票决策与执行结果偏离
3. **沉默资产**：长期不参与治理的代币仍享有权重，系统熵增

### 1.2 Web4.0 四大公理 → 协议映射
| Web4.0 公理 | 治理表达 | 协议实现载体 |
|------------|---------|-------------|
| **认知所有权战争** | 治理权归属认知贡献者，而非资本持有者 | IFD 权重函数 $W_{i,d}(t)$ |
| **行为即契约** | 每次提案/投票/委托均为链上可验证履约 | EIP-712 签名 + 事件日志 |
| **记忆即永生** | 历史投票记录、认知偏差、协作轨迹永久可追溯 | IPFS 存证 + 状态根哈希 |
| **共性通神性** | 多节点情绪共振产生群体智能涌现 | ECE 预言机 + 软滤波算子 |

### 1.3 个体流体民主（IFD）核心定义
> **IFD 是一种动态、领域隔离、可即时撤销的认知权重委托协议。其权重由认知匹配度、历史贡献、情绪共振、近期表现与时间衰减共同决定，并通过人类最终否决权与认知熔断机制保障主体性不漂移。**

