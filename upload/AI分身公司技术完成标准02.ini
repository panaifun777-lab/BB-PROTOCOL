## 📊 交付物4："认知引用漏斗"数据看板SQL模板

```sql
-- 数据集：cognitive_citations (The Graph子图索引)
-- 用途：监控"内容标注→被引用→结算→复利"全链路

-- 1. 引用转化漏斗（按创作者层级）
WITH funnel AS (
  SELECT 
      creator_tier,
      COUNT(DISTINCT soul_id) as labeled_avatars,                    -- 步骤1: 创建标注
      COUNT(DISTINCT CASE WHEN first_citation_at IS NOT NULL THEN soul_id END) as cited_avatars,  -- 步骤2: 首次被引
      COUNT(DISTINCT CASE WHEN total_citations >= 5 THEN soul_id END) as high_cited_avatars,      -- 步骤3: 高引用(≥5次)
      COUNT(DISTINCT CASE WHEN cumulative_revenue_usd >= 1 THEN soul_id END) as monetized_avatars -- 步骤4: 产生收益
  FROM creator_citation_metrics
  WHERE onboarded_at >= CURRENT_DATE - INTERVAL '30 days'
  GROUP BY creator_tier
)
SELECT 
    creator_tier,
    labeled_avatars,
    ROUND(cited_avatars * 100.0 / labeled_avatars, 1) as citation_rate_pct,
    ROUND(high_cited_avatars * 100.0 / labeled_avatars, 1) as high_citation_rate_pct,
    ROUND(monetized_avatars * 100.0 / labeled_avatars, 1) as monetization_rate_pct
FROM funnel
ORDER BY creator_tier;

-- 2. 高价值片段特征分析（优化标注策略）
SELECT 
    semantic_tag,
    COUNT(*) as segment_count,
    PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY citation_count) as median_citations,
    AVG(cumulative_revenue_usd) as avg_revenue_per_segment,
    AVG(time_to_first_citation_hours) as avg_hours_to_first_citation
FROM cognitive_segments
WHERE created_at >= CURRENT_DATE - INTERVAL '60 days'
    AND citation_count > 0
GROUP BY semantic_tag
ORDER BY avg_revenue_per_segment DESC;

-- 3. 性能体验与引用率关联（验证INP校准假设）
SELECT 
    CASE 
        WHEN avg_inp_ms <= 200 THEN '✅ Good (≤200ms)'
        WHEN avg_inp_ms <= 500 THEN '🟡 Needs Improvement (200-500ms)'
        ELSE '❌ Poor (>500ms)'
    END as inp_category,
    COUNT(DISTINCT soul_id) as avatar_count,
    ROUND(AVG(citation_rate_7d), 3) as avg_citation_rate,
    ROUND(AVG(resonance_score), 1) as avg_resonance_score
FROM avatar_performance_metrics
WHERE last_updated >= CURRENT_DATE - INTERVAL '7 days'
GROUP BY inp_category
ORDER BY avg_citation_rate DESC;

-- 4. 实时引用结算监控（告警用）
SELECT 
    DATE_TRUNC('hour', settlement_timestamp) as hour,
    COUNT(*) as citation_count,
    SUM(settlement_amount_usd) as total_revenue_usd,
    COUNT(DISTINCT soul_id) as unique_avatars_earning,
    -- 异常检测：结算失败率 > 5% 触发告警
    ROUND(COUNT(CASE WHEN settlement_status = 'failed' THEN 1 END) * 100.0 / COUNT(*), 2) as failure_rate_pct
FROM x402_citation_settlements
WHERE settlement_timestamp >= CURRENT_TIMESTAMP - INTERVAL '24 hours'
GROUP BY hour
ORDER BY hour DESC;
```

