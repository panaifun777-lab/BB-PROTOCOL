## 4. 协议工程实现规范（Production Implementation）

### 4.1 链上/链下协同架构（Gas 优化）
```solidity
// SPDX-License-Identifier: MIT
interface IIFDRouter {
    struct Delegation {
        address delegator;
        address delegate;
        string domain;
        uint256 weightBps; // 0-10000
        uint256 expiresAt;
    }
    
    function submitDelegation(Delegation calldata del, bytes memory eceProof) external;
    function revokeDelegation(address delegate, string memory domain) external;
    function computeEffectiveWeight(string memory domain) external view returns (uint256 total, uint256[] memory weights);
    function executeProposal(uint256 proposalId, bytes calldata executionData) external;
}

// 链下计算引擎（Rust/Go）
// 输入: 链上事件流 + ECE 签名 + IPFS 认知凭证
// 输出: 权重快照 Merkle Root + 零知识证明 π
// 链上仅验证: require(verifyZKWeight(merkleRoot, π), "Invalid weight proof");
```

### 4.2 ECE 预言机规范（Oracle Spec）
- **输入**：用户交互日志、语义情感分析（LLM + 情绪词典）、生理/行为代理信号
- **输出**：$R_i(t) \in [0,100]$，EIP-712 签名 payload
- **安全机制**：
  - 多签网络（3/5 节点），恶意节点 Slasher 机制
  - 滑动窗口共识（过去 24h 数据加权）
  - ZK-ML 验证预留接口（未来隐私计算）

### 4.3 治理执行流（On-Chain Flow）
1. 提案提交 → 冻结期 72h（反闪电贷攻击）
2. IFD 计算权重快照 → 生成 Merkle Root
3. ECE 校验共振偏离 → 输出 $\mathcal{F}_{ECE}$ 过滤权重
4. 投票期 5 天 → 达到 60% 有效权重即通过
5. 自动执行或进入人工复核队列（高风险提案）

