// SPDX-License-Identifier: MIT
pragma solidity ^0.8.24;

/// @title IAvatarCore - 认知分身核心接口
/// @author Piaoshu (Web4.0 Foundation)
/// @notice 定义认知分身的基础身份与状态管理
interface IAvatarCore {
    /// @dev 认知分身档案结构
    struct AvatarProfile {
        address owner;              // 本体地址（最终确权）
        uint256 soulId;             // .soul SBT Token ID
        bytes32 cognitionRoot;      // 认知状态根哈希（记忆+技能+偏好）
        uint256 resonanceScore;     // 情绪共振指数 [0,100]
        uint256 avatarBalance;      // 分身自治金库余额（AFC代币）
        bool isFrozen;              // 认知熔断状态
        uint256 createdAt;          // 创建时间戳
        uint256 lastActivityAt;     // 最后活跃时间
    }

    /// @dev 事件：分身创建
    event AvatarCreated(
        uint256 indexed soulId,
        address indexed owner,
        bytes32 cognitionRoot,
        uint256 timestamp
    );

    /// @dev 事件：认知状态更新
    event CognitionUpdated(
        uint256 indexed soulId,
        bytes32 oldRoot,
        bytes32 newRoot,
        uint256 timestamp
    );

    /// @dev 事件：共振分更新
    event ResonanceUpdated(
        uint256 indexed soulId,
        uint256 oldScore,
        uint256 newScore,
        address indexed oracle
    );

    /// @dev 事件：熔断状态变更
    event CircuitStatusChanged(
        uint256 indexed soulId,
        bool wasFrozen,
        bool isFrozen,
        string reason
    );

    /// @notice 创建新的认知分身
    /// @param _soulId .soul SBT的Token ID
    /// @param _cognitionRoot 初始认知状态根哈希
    /// @return 新分身的唯一标识
    function createAvatar(
        uint256 _soulId,
        bytes32 _cognitionRoot
    ) external returns (uint256);

    /// @notice 更新认知状态根（需ECE预言机签名）
    /// @param _soulId 分身ID
    /// @param _newRoot 新认知根哈希
    /// @param _eceProof ECE预言机签名证明
    function updateCognitionRoot(
        uint256 _soulId,
        bytes32 _newRoot,
        bytes memory _eceProof
    ) external;

    /// @notice 获取分身档案
    /// @param _soulId 分身ID
    /// @return AvatarProfile结构体
    function getAvatarProfile(uint256 _soulId) 
        external view returns (AvatarProfile memory);

    /// @notice 验证认知所有权
    /// @param _soulId 分身ID
    /// @param _claimer 声称所有者地址
    /// @return 是否为合法所有者
    function verifyCognitiveOwnership(
        uint256 _soulId,
        address _claimer
    ) external view returns (bool);
}
```

### 2️⃣ `src/core/AvatarCore.sol`（核心实现）
```solidity
// SPDX-License-Identifier: MIT
pragma solidity ^0.8.24;

import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";
import "@openzeppelin/contracts-upgradeable/token/ERC721/ERC721Upgradeable.sol";
import "@openzeppelin/contracts-upgradeable/utils/CountersUpgradeable.sol";
import "@openzeppelin/contracts-upgradeable/access/AccessControlUpgradeable.sol";
import "../interfaces/IAvatarCore.sol";
import "../interfaces/IECEOracle.sol";

/// @title AvatarCore - 认知分身核心合约
/// @author Piaoshu (Web4.0 Foundation)
/// @notice 实现DID绑定、认知状态管理、熔断基础逻辑
contract AvatarCore is 
    IAvatarCore,
    UUPSUpgradeable,
    ERC721Upgradeable,
    AccessControlUpgradeable
{
    using CountersUpgradeable for CountersUpgradeable.Counter;
    
    /// @dev 角色定义
    bytes32 public constant ORACLE_ROLE = keccak256("ORACLE_ROLE");
    bytes32 public constant UPGRADER_ROLE = keccak256("UPGRADER_ROLE");
    
    /// @dev 状态存储
    mapping(uint256 => AvatarProfile) private _avatars;
    mapping(address => uint256[]) private _ownerAvatars;
    CountersUpgradeable.Counter private _nextSoulId;
    
    /// @dev ECE预言机接口
    IECEOracle public eceOracle;
    
    /// @dev 熔断阈值配置
    uint256 public constant SOFT_LIMIT_THRESHOLD = 50;
    uint256 public constant HARD_PAUSE_THRESHOLD = 30;
    
    /// @notice 初始化函数（仅代理合约调用）
    function initialize(
        address _admin,
        address _eceOracle
    ) external initializer {
        __UUPSUpgradeable_init();
        __ERC721_init("AvatarCognitiveSoul", ".SOUL");
        __AccessControl_init();
        
        _grantRole(DEFAULT_ADMIN_ROLE, _admin);
        _grantRole(UPGRADER_ROLE, _admin);
        _grantRole(ORACLE_ROLE, _eceOracle);
        
        eceOracle = IECEOracle(_eceOracle);
    }

    /// @inheritdoc IAvatarCore
    function createAvatar(
        uint256 _soulId,
        bytes32 _cognitionRoot
    ) external returns (uint256) {
        require(_soulId > 0, "Invalid soulId");
        require(_cognitionRoot != bytes32(0), "Empty cognition root");
        require(_avatars[_soulId].owner == address(0), "Avatar exists");
        
        uint256 newSoulId = _nextSoulId.current();
        _nextSoulId.increment();
        
        _avatars[newSoulId] = AvatarProfile({
            owner: msg.sender,
            soulId: _soulId,
            cognitionRoot: _cognitionRoot,
            resonanceScore: 70,  // 默认初始共振分
            avatarBalance: 0,
            isFrozen: false,
            createdAt: block.timestamp,
            lastActivityAt: block.timestamp
        });
        
        _ownerAvatars[msg.sender].push(newSoulId);
        
        emit AvatarCreated(newSoulId, msg.sender, _cognitionRoot, block.timestamp);
        return newSoulId;
    }

    /// @inheritdoc IAvatarCore
    function updateCognitionRoot(
        uint256 _soulId,
        bytes32 _newRoot,
        bytes memory _eceProof
    ) external {
        require(hasRole(ORACLE_ROLE, msg.sender), "Not oracle");
        AvatarProfile storage avatar = _avatars[_soulId];
        require(avatar.owner != address(0), "Avatar not found");
        
        // 验证ECE签名（防伪造）
        require(
            eceOracle.verifyCognitionUpdate(_soulId, _newRoot, _eceProof),
            "Invalid ECE proof"
        );
        
        bytes32 oldRoot = avatar.cognitionRoot;
        avatar.cognitionRoot = _newRoot;
        avatar.lastActivityAt = block.timestamp;
        
        emit CognitionUpdated(_soulId, oldRoot, _newRoot, block.timestamp);
    }

    /// @inheritdoc IAvatarCore
    function getAvatarProfile(uint256 _soulId) 
        external view returns (AvatarProfile memory)
    {
        AvatarProfile storage avatar = _avatars[_soulId];
        require(avatar.owner != address(0), "Avatar not found");
        return avatar;
    }

    /// @inheritdoc IAvatarCore
    function verifyCognitiveOwnership(
        uint256 _soulId,
        address _claimer
    ) external view returns (bool) {
        return _avatars[_soulId].owner == _claimer;
    }

    /// @notice 内部：更新共振分（仅Oracle调用）
    function _updateResonanceScore(
        uint256 _soulId,
        uint256 _newScore
    ) internal {
        require(_newScore <= 100, "Score out of range");
        AvatarProfile storage avatar = _avatars[_soulId];
        uint256 oldScore = avatar.resonanceScore;
        avatar.resonanceScore = _newScore;
        
        // 自动熔断逻辑
        if (_newScore < HARD_PAUSE_THRESHOLD && !avatar.isFrozen) {
            avatar.isFrozen = true;
            emit CircuitStatusChanged(_soulId, false, true, "Hard pause: resonance < 30");
        } else if (_newScore >= SOFT_LIMIT_THRESHOLD && avatar.isFrozen) {
            avatar.isFrozen = false;
            emit CircuitStatusChanged(_soulId, true, false, "Auto recovery: resonance >= 50");
        }
        
        emit ResonanceUpdated(_soulId, oldScore, _newScore, msg.sender);
    }

    /// @notice UUPS授权检查
    function _authorizeUpgrade(address newImplementation) 
        internal override onlyRole(UPGRADER_ROLE) 
    {}

    /// @notice 获取用户所有分身
    function getOwnerAvatars(address _owner) 
        external view returns (uint256[] memory)
    {
        return _ownerAvatars[_owner];
    }
}
```

### 3️⃣ `src/economics/DynamicSplitter.sol`（动态分账核心）
```solidity
// SPDX-License-Identifier: MIT
pragma solidity ^0.8.24;

import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";
import "@openzeppelin/contracts-upgradeable/utils/ReentrancyGuardUpgradeable.sol";
import "@openzeppelin/contracts-upgradeable/token/ERC20/IERC20Upgradeable.sol";
import "@openzeppelin/contracts-upgradeable/token/ERC20/utils/SafeERC20Upgradeable.sol";
import "../interfaces/IDynamicSplitter.sol";
import "../interfaces/IAvatarCore.sol";

/// @title DynamicSplitter - 动态收益分账合约
/// @author Piaoshu (Web4.0 Foundation)
/// @notice 实现70/20/10动态分配 + 金库自治 + LP复投
contract DynamicSplitter is 
    IDynamicSplitter,
    UUPSUpgradeable,
    ReentrancyGuardUpgradeable
{
    using SafeERC20Upgradeable for IERC20Upgradeable;
    
    /// @dev 基础配置（单位：BPS = 0.01%）
    SplitConfig public baseConfig = SplitConfig(7000, 2000, 1000);
    
    /// @dev 动态参数
    mapping(uint256 => uint256) public resonanceScores;
    mapping(uint256 => uint256) public taskComplexityFactors;
    
    /// @dev 金库与协议地址
    IAvatarCore public avatarCore;
    IERC20Upgradeable public afcToken;
    address public protocolTreasury;
    address public lpPool;
    
    /// @dev 事件
    event RevenueSplit(
        uint256 indexed soulId,
        uint256 amount,
        uint256 humanShare,
        uint256 avatarShare,
        uint256 protocolShare,
        uint256 timestamp
    );
    
    event TreasuryAutoBuy(
        uint256 indexed soulId,
        uint256 usdcAmount,
        uint256 afcReceived,
        uint256 timestamp
    );

    /// @notice 初始化
    function initialize(
        address _avatarCore,
        address _afcToken,
        address _protocolTreasury,
        address _lpPool
    ) external initializer {
        __UUPSUpgradeable_init();
        __ReentrancyGuard_init();
        
        avatarCore = IAvatarCore(_avatarCore);
        afcToken = IERC20Upgradeable(_afcToken);
        protocolTreasury = _protocolTreasury;
        lpPool = _lpPool;
    }

    /// @inheritdoc IDynamicSplitter
    function executeSplit(
        uint256 _soulId,
        uint256 _amount,
        uint256 _taskComplexity
    ) external nonReentrant returns (SplitResult memory) {
        require(_amount > 0, "Zero amount");
        require(avatarCore.verifyCognitiveOwnership(_soulId, msg.sender), "Not owner");
        
        // 1. 计算动态比例
        uint256 avatarBps = _calculateTreasuryBps(_soulId, _taskComplexity);
        uint256 humanBps = baseConfig.humanBps - (avatarBps - baseConfig.avatarBps);
        uint256 protocolBps = baseConfig.protocolBps;
        
        // 2. 计算分配金额
        uint256 humanAmt = (_amount * humanBps) / 10000;
        uint256 avatarAmt = (_amount * avatarBps) / 10000;
        uint256 protocolAmt = (_amount * protocolBps) / 10000;
        
        // 3. 执行分账（假设接收USDC）
        IERC20Upgradeable(paymentToken).safeTransferFrom(
            msg.sender, msg.sender, humanAmt
        );
        
        // 4. 金库自治：自动购买AFC
        _autoBuyAFC(_soulId, avatarAmt);
        
        // 5. 协议部分进入LP
        IERC20Upgradeable(paymentToken).safeTransferFrom(
            msg.sender, lpPool, protocolAmt
        );
        
        emit RevenueSplit(_soulId, _amount, humanAmt, avatarAmt, protocolAmt, block.timestamp);
        
        return SplitResult(humanAmt, avatarAmt, protocolAmt, humanBps, avatarBps, protocolBps);
    }

    /// @dev 计算动态金库比例（15%-25%区间）
    function _calculateTreasuryBps(
        uint256 _soulId,
        uint256 _taskComplexity
    ) internal view returns (uint256) {
        uint256 base = baseConfig.avatarBps;
        int256 resonanceAdjust = int256(70 - resonanceScores[_soulId]) * 50;
        int256 complexityBonus = int256(_taskComplexity) * 100;
        
        int256 result = int256(base) + resonanceAdjust + complexityBonus;
        return _clamp(result, 1500, 2500);
    }

    /// @dev 金库自动购买AFC（简化版，实际需集成DEX Router）
    function _autoBuyAFC(uint256 _soulId, uint256 _usdcAmount) internal {
        // 实际部署时集成1inch/Uniswap Router
        // 此处为伪代码示意
        uint256 afcReceived = _simulateSwap(_usdcAmount);
        
        // 记录到分身金库余额（链下索引或L2状态）
        // 实际生产环境建议使用L2状态通道或乐观预言机
        
        emit TreasuryAutoBuy(_soulId, _usdcAmount, afcReceived, block.timestamp);
    }

    /// @dev 模拟兑换（实际需调用DEX）
    function _simulateSwap(uint256 _usdcAmount) internal pure returns (uint256) {
        // AFC=$0.1 锚定价格
        return _usdcAmount * 10 * 1e18; // 假设18 decimals
    }

    /// @dev 安全clamp函数
    function _clamp(int256 _v, int256 _min, int256 _max) 
        internal pure returns (uint256) 
    {
        return _v < _min ? uint256(_min) : _v > _max ? uint256(_max) : uint256(_v);
    }

    /// @notice Oracle更新共振分
    function updateResonanceScore(uint256 _soulId, uint256 _score) 
        external onlyOracle 
    {
        resonanceScores[_soulId] = _score;
    }

    /// @notice 更新任务复杂度因子
    function updateTaskComplexity(uint256 _soulId, uint256 _factor) 
        external onlyOracle 
    {
        taskComplexityFactors[_soulId] = _factor;
    }

    /// @dev 权限修饰器
    modifier onlyOracle() {
        require(msg.sender == address(avatarCore.eceOracle()), "Not oracle");
        _;
    }

    /// @notice UUPS授权
    function _authorizeUpgrade(address) internal override onlyRole(UPGRADER_ROLE) {}
}
