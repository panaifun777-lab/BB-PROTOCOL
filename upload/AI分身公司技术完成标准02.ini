```solidity
// SPDX-License-Identifier: MIT
pragma solidity ^0.8.24;

import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";
import "@openzeppelin/contracts-upgradeable/access/AccessControlUpgradeable.sol";
import "../interfaces/ICircuitGuard.sol";
import "../interfaces/IAvatarCore.sol";

/// @title CircuitGuard - 认知熔断分级控制器
/// @author Piaoshu (Web4.0 Foundation)
/// @notice 实现NORMAL/SOFT_LIMIT/HARD_PAUSE/RECOVERY四级状态
contract CircuitGuard is 
    ICircuitGuard,
    UUPSUpgradeable,
    AccessControlUpgradeable
{
    /// @dev 角色
    bytes32 public constant GUARDIAN_ROLE = keccak256("GUARDIAN_ROLE");
    
    /// @dev 状态枚举
    enum CircuitState { NORMAL, SOFT_LIMIT, HARD_PAUSE, RECOVERY }
    
    /// @dev 依赖合约
    IAvatarCore public avatarCore;
    
    /// @dev 状态映射
    mapping(uint256 => CircuitState) public states;
    mapping(uint256 => uint256) public lastStateChange;
    mapping(uint256 => ActionLog[]) public actionLogs;
    
    /// @dev 配置参数
    uint256 public constant AUTO_RECOVERY_WINDOW = 72 hours;
    uint256 public constant SOFT_THRESHOLD = 50;
    uint256 public constant HARD_THRESHOLD = 30;
    
    /// @dev 事件
    event StateChanged(
        uint256 indexed soulId,
        CircuitState oldState,
        CircuitState newState,
        string reason
    );
    
    event ActionLogged(
        uint256 indexed soulId,
        bytes32 actionHash,
        bool isHighRisk,
        bool allowed,
        string reason
    );

    /// @notice 初始化
    function initialize(address _avatarCore, address _admin) 
        external initializer 
    {
        __UUPSUpgradeable_init();
        __AccessControl_init();
        
        _grantRole(DEFAULT_ADMIN_ROLE, _admin);
        _grantRole(GUARDIAN_ROLE, _admin);
        avatarCore = IAvatarCore(_avatarCore);
    }

    /// @inheritdoc ICircuitGuard
    function evaluateState(uint256 _soulId) 
        public view returns (CircuitState) 
    {
        IAvatarCore.AvatarProfile memory profile = avatarCore.getAvatarProfile(_soulId);
        uint256 score = profile.resonanceScore;
        
        if (profile.isFrozen) return CircuitState.HARD_PAUSE;
        if (score >= 70) return CircuitState.NORMAL;
        if (score >= SOFT_THRESHOLD) return CircuitState.SOFT_LIMIT;
        return CircuitState.HARD_PAUSE;
    }

    /// @inheritdoc ICircuitGuard
    function executeWithGuard(
        uint256 _soulId,
        bytes32 _actionHash,
        bool _isHighRisk
    ) external returns (bool) {
        CircuitState state = evaluateState(_soulId);
        
        if (state == CircuitState.HARD_PAUSE) {
            _logAction(_soulId, _actionHash, _isHighRisk, false, "Hard paused");
            revert CircuitHardPaused(_soulId);
        }
        
        if (state == CircuitState.SOFT_LIMIT && _isHighRisk) {
            _logAction(_soulId, _actionHash, _isHighRisk, false, "Soft limit blocks high-risk");
            revert SoftLimitBlock(_soulId);
        }
        
        // 记录成功执行
        _logAction(_soulId, _actionHash, _isHighRisk, true, "Executed");
        
        // 自动状态恢复检查
        _checkAutoRecovery(_soulId);
        
        return true;
    }

    /// @dev 记录操作日志
    function _logAction(
        uint256 _soulId,
        bytes32 _actionHash,
        bool _isHighRisk,
        bool _allowed,
        string memory _reason
    ) internal {
        actionLogs[_soulId].push(ActionLog({
            actionHash: _actionHash,
            isHighRisk: _isHighRisk,
            allowed: _allowed,
            reason: _reason,
            timestamp: block.timestamp
        }));
        
        emit ActionLogged(_soulId, _actionHash, _isHighRisk, _allowed, _reason);
    }

    /// @dev 检查自动恢复条件
    function _checkAutoRecovery(uint256 _soulId) internal {
        CircuitState currentState = states[_soulId];
        if (currentState != CircuitState.SOFT_LIMIT) return;
        
        if (block.timestamp >= lastStateChange[_soulId] + AUTO_RECOVERY_WINDOW) {
            IAvatarCore.AvatarProfile memory profile = avatarCore.getAvatarProfile(_soulId);
            if (profile.resonanceScore >= SOFT_THRESHOLD) {
                states[_soulId] = CircuitState.RECOVERY;
                lastStateChange[_soulId] = block.timestamp;
                emit StateChanged(_soulId, CircuitState.SOFT_LIMIT, CircuitState.RECOVERY, "Auto recovery window elapsed");
            }
        }
    }

    /// @notice 人工干预：强制状态变更（仅Guardian）
    function forceStateChange(
        uint256 _soulId,
        CircuitState _newState,
        string calldata _reason
    ) external onlyRole(GUARDIAN_ROLE) {
        CircuitState oldState = states[_soulId];
        states[_soulId] = _newState;
        lastStateChange[_soulId] = block.timestamp;
        
        emit StateChanged(_soulId, oldState, _newState, _reason);
    }

    /// @notice 获取操作历史
    function getActionHistory(uint256 _soulId, uint256 _limit, uint256 _offset)
        external view returns (ActionLog[] memory)
    {
        ActionLog[] storage logs = actionLogs[_soulId];
        uint256 end = _offset + _limit > logs.length ? logs.length : _offset + _limit;
        
        ActionLog[] memory result = new ActionLog[](end - _offset);
        for (uint256 i = _offset; i < end; i++) {
            result[i - _offset] = logs[i];
        }
        return result;
    }

    /// @notice UUPS授权
    function _authorizeUpgrade(address) internal override onlyRole(DEFAULT_ADMIN_ROLE) {}
}
